<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda Técnico Inteligente</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #0f172a 0%, #020617 75%);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
      padding: 16px;
    }

    .topo {
      margin-bottom: 20px;
      text-align: center;
    }

    .topo h1 {
      font-size: 26px;
      font-weight: 800;
      background: linear-gradient(90deg, #22d3ee, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .topo p {
      color: #94a3b8;
      font-size: 14px;
      margin-top: 6px;
    }

    .btn-config {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #cbd5e1;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 18px;
      border-radius: 12px;
      cursor: pointer;
      margin: 14px auto 0;
      display: block;
      transition: all 0.25s ease;
    }

    .form-add-tecnico {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
    }

    .input-add {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 14.5px;
      color: white;
      outline: none;
      flex: 1;
    }

    .btn-add {
      background: linear-gradient(135deg, #22d3ee, #3b82f6);
      border: none;
      color: white;
      font-weight: 700;
      padding: 12px 20px;
      border-radius: 14px;
      cursor: pointer;
    }

    .lista-gerenciar {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 240px;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.2);
      padding: 12px;
      border-radius: 16px;
    }

    .item-gerenciar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 15px;
      color: #cbd5e1;
      padding: 8px 12px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.02);
    }

    .acoes-gerenciar-tec {
      display: flex;
      gap: 6px;
    }

    .btn-editar-tec-lista {
      background: rgba(96, 165, 250, 0.12);
      border: 1px solid rgba(96, 165, 250, 0.25);
      color: #60a5fa;
      font-size: 11.5px;
      font-weight: 700;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn-deletar-tec {
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.25);
      color: #f87171;
      font-size: 11.5px;
      font-weight: 700;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
    }

    .seletor-tecnico {
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 650px;
      margin: 0 auto 32px;
    }

    .seletor-tecnico.oculto { display: none !important; }

    .card-monitor {
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .monitor-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .monitor-info-esquerda {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      flex: 1;
    }

    .monitor-nome {
      font-size: 18px;
      font-weight: 800;
      color: #f8fafc;
    }

    .status-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .status-preview span {
      font-size: 11px;
      font-weight: 700;
      padding: 4px 8px;
      border-radius: 999px;
    }

    .preview-rota { background: rgba(234, 179, 8, 0.15); color: #fde047; }
    .preview-concluido { background: rgba(34, 197, 94, 0.15); color: #4ade80; }
    .preview-nao-concluido { background: rgba(244, 63, 94, 0.15); color: #f87171; }
    .preview-aguardando { background: rgba(148, 163, 184, 0.12); color: #94a3b8; }

    .btn-dropdown {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #94a3b8;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 10px;
      cursor: pointer;
    }

    .monitor-atividades {
      display: none;
      flex-direction: column;
      gap: 10px;
      margin-top: 6px;
      padding-top: 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .monitor-atividades.visivel { display: flex; }

    .log-atividade {
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: rgba(255, 255, 255, 0.02);
      padding: 12px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    .log-atividade:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .log-atividade:active {
      transform: scale(0.99);
    }

    .log-badge {
      font-weight: 800;
      font-size: 11px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 8px;
      align-self: flex-start;
    }

    .log-badge.rota { background: rgba(234, 179, 8, 0.12); color: #facc15; }
    .log-badge.concluido { background: rgba(34, 197, 94, 0.12); color: #4ade80; }
    .log-badge.nao-concluido { background: rgba(239, 68, 68, 0.12); color: #f87171; }
    .log-badge.aguardando { background: rgba(148, 163, 184, 0.08); color: #94a3b8; }

    .log-info strong { color: #f1f5f9; font-size: 15px; font-weight: 700; display: block; }
    .log-info .tipo-servico { color: #94a3b8; font-size: 13px; display: block; margin-top: 2px; }
    
    .log-info .obs-texto { 
      color: #f87171; 
      font-size: 12.5px; 
      display: block; 
      margin-top: 6px; 
      font-style: italic; 
      background: rgba(244, 63, 94, 0.06); 
      padding: 6px 10px; 
      border-radius: 8px; 
      border-left: 3px solid #ef4444; 
    }

    .log-hora {
      font-size: 12px;
      color: #cbd5e1;
      font-weight: 600;
      align-self: flex-end;
    }

    .sem-atividade {
      color: #64748b;
      font-size: 14px;
      font-style: italic;
      text-align: center;
    }

    .painel-tecnico.oculto { display: none !important; }

    .btn-trocar {
      display: block;
      margin: 0 auto 16px;
      border: none;
      background: none;
      color: #67e8f9;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .importador {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 16px;
      margin-bottom: 24px;
    }

    .importador.oculto { display: none !important; }

    textarea {
      width: 100%;
      min-height: 180px;
      resize: vertical;
      border: none;
      outline: none;
      border-radius: 16px;
      padding: 14px;
      font-size: 14px;
      background: rgba(255, 255, 255, 0.07);
      color: white;
    }

    .btn-gerar {
      width: 100%;
      margin-top: 14px;
      border: none;
      padding: 14px;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #22d3ee, #3b82f6);
    }

    .btn-mostrar {
      display: none;
      width: 100%;
      margin-bottom: 16px;
      border: none;
      padding: 14px;
      border-radius: 16px;
      font-size: 14px;
      font-weight: 700;
      color: white;
      background: rgba(255, 255, 255, 0.08);
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-bottom: 20px;
    }

    .card {
      width: 100%;
      border-radius: 24px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      position: relative;
    }

    .btn-editar-os {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 32px;
      height: 32px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: #a5b4fc;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    .card-top-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
      max-width: 85%;
    }

    .horario {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 999px;
      background: linear-gradient(90deg, #22d3ee, #3b82f6);
      font-size: 12.5px;
      font-weight: 700;
    }

    .card-status-topo {
      font-size: 12px;
      font-weight: 700;
      padding: 5px 12px;
      border-radius: 999px;
    }

    .card-status-topo.vazio { background: rgba(255,255,255,0.06); color: #94a3b8; }
    .card-status-topo.rota { background: rgba(234,179,8,0.2); color: #facc15; }
    .card-status-topo.concluido { background: rgba(34,197,94,0.2); color: #4ade80; }
    .card-status-topo.nao-concluido { background: rgba(244,63,94,0.2); color: #f87171; }

    .cliente { font-size: 20px; font-weight: 800; margin-bottom: 12px; padding-right: 40px; }
    .info { color: #cbd5e1; line-height: 1.5; margin: 8px 0; font-size: 14px; }
    .info strong { color: #e0f2fe; }

    .info-linha {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 8px 0;
      background: rgba(255,255,255,0.02);
      padding: 8px 12px;
      border-radius: 12px;
    }

    .btn-copiar {
      flex-shrink: 0;
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      color: #67e8f9;
      background: rgba(103, 232, 249, 0.12);
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .os-number {
      font-size: 14px;
      font-weight: 800;
      color: #67e8f9;
      background: rgba(103, 232, 249, 0.12);
      padding: 3px 8px;
      border-radius: 6px;
    }

    .assunto {
      font-size: 13.5px;
      color: #a5b4fc;
      background: rgba(165, 180, 252, 0.1);
      padding: 6px 10px;
      border-radius: 6px;
      margin: 8px 0;
      display: inline-block;
    }

    .botoes-grupo-novo {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn-links-linha {
      display: flex;
      gap: 10px;
    }

    .btn-acao-mobile {
      flex: 1;
      border: none;
      padding: 12px;
      border-radius: 14px;
      font-size: 13.5px;
      font-weight: 700;
      cursor: pointer;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-maps-mob { background: linear-gradient(135deg, #f43f5e, #fb923c); }
    .btn-ativo-mob { background: linear-gradient(135deg, #64748b, #475569); }

    .seletor-status-container {
      position: relative;
      width: 100%;
    }

    .select-status-unico {
      width: 100%;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #f1f5f9;
      padding: 14px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      appearance: none;
      text-align: center;
    }

    .seletor-status-container::after {
      content: '▾';
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #67e8f9;
      pointer-events: none;
      font-size: 16px;
    }

    .card-obs-preview {
      margin-top: 12px;
      font-size: 13px;
      color: #f87171;
      background: rgba(244, 63, 94, 0.08);
      padding: 10px 14px;
      border-radius: 12px;
      border-left: 4px solid #ef4444;
      font-style: italic;
    }
    
    .card-obs-preview.concluida-obs {
      color: #4ade80;
      background: rgba(34, 197, 94, 0.08);
      border-left-color: #22c55e;
    }

    /* Modais */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(2, 6, 23, 0);
      backdrop-filter: blur(0px);
      align-items: center;
      justify-content: center;
      padding: 16px;
      transition: all 0.3s ease;
    }

    .modal-overlay.aberto {
      display: flex;
      background: rgba(2, 6, 23, 0.85);
      backdrop-filter: blur(8px);
    }

    .modal {
      background: #0f172a;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 24px 20px;
      width: 100%;
      max-width: 440px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      opacity: 0;
      transform: scale(0.95) translateY(10px);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .modal-overlay.aberto .modal { opacity: 1; transform: scale(1) translateY(0); }

    .modal.shake { animation: chacoalhar 0.4s both; }

    @keyframes chacoalhar {
      10%, 90% { transform: translate3d(-2px, 0, 0); }
      20%, 80% { transform: translate3d(4px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-5px, 0, 0); }
      40%, 60% { transform: translate3d(5px, 0, 0); }
    }

    .modal-senha { text-align: center; }
    .erro-senha { color: #f87171; font-size: 13px; font-weight: 600; margin-top: 10px; display: none; }
    .modal-titulo { font-size: 18px; font-weight: 800; margin-bottom: 20px; background: linear-gradient(90deg, #22d3ee, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .modal-fechar {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.07);
      color: #94a3b8;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .campo-grupo { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .senha-input-wrapper { position: relative; width: 100%; }
    .campo-input { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; font-size: 14.5px; color: white; outline: none; width: 100%; }
    
    .btn-toggle-senha {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #64748b;
    }

    .campo-textarea-modal { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; font-size: 14.5px; color: white; outline: none; width: 100%; min-height: 80px; resize: vertical; }
    .campo-select { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; font-size: 14.5px; color: white; outline: none; width: 100%; cursor: pointer; appearance: none; }
    .campo-select option { background: #0f172a; color: white; }
    .select-wrapper { position: relative; }
    .select-wrapper::after { content: '▾'; position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: #64748b; pointer-events: none; }

    .modal-divider { border: none; border-top: 1px solid rgba(255,255,255,0.07); margin: 16px 0; }
    .modal-secao { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
    .btn-salvar-modal { width: 100%; margin-top: 16px; border: none; padding: 14px; border-radius: 14px; font-size: 15px; font-weight: 700; cursor: pointer; color: white; background: linear-gradient(135deg, #22d3ee, #3b82f6); }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15, 23, 42, 0.96);
      border: 1px solid rgba(34, 211, 238, 0.2);
      backdrop-filter: blur(16px);
      padding: 12px 24px;
      border-radius: 16px;
      font-weight: 600;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: all 0.4s;
      z-index: 999;
      white-space: nowrap;
    }

    .toast.show { opacity: 1; }

    .loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(2, 6, 23, 0.75);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }

    .loading-overlay.ativo { display: flex; }
    .spinner { width: 50px; height: 50px; border-radius: 50%; border: 3px solid rgba(255, 255, 255, 0.03); border-top-color: #22d3ee; animation: rodar 1s linear infinite; }
    @keyframes rodar { to { transform: rotate(360deg); } }
    .loading-texto { font-size: 14px; font-weight: 700; color: #e2e8f0; }
  </style>
</head>

<body>

  <div class="topo">
    <h1>📡 Monitoramento Técnico</h1>
    <p id="subtitulo">Toque no painel do técnico para ver a agenda</p>
    <button class="btn-config" onclick="abrirModalSenha()">⚙️ Gerenciar Técnicos</button>
  </div>

  <div class="modal-overlay" id="modalSenhaOverlay">
    <div class="modal modal-senha" id="cardModalSenha">
      <button class="modal-fechar" onclick="fecharModalSenha()">✕</button>
      <div class="modal-titulo">🔑 Área Restrita</div>
      <div class="modal-secao" style="margin-bottom: 20px;">Digite a senha master</div>
      
      <div class="campo-grupo">
        <div class="senha-input-wrapper">
          <input type="password" class="campo-input" id="inputSenhaMaster" placeholder="Senha..." style="text-align: center; font-size: 16px;" onkeydown="verificarTeclaSenha(event)" />
          <button class="btn-toggle-senha" onclick="toggleVisibilidadeSenha()" id="btnToggleSenha">👁️</button>
        </div>
        <div class="erro-senha" id="erroSenhaMsg">⚠️ Senha incorreta!</div>
      </div>
      <button class="btn-salvar-modal" onclick="validarSenhaMaster()">Confirmar Acesso</button>
    </div>
  </div>

  <div class="modal-overlay" id="modalConfigOverlay">
    <div class="modal">
      <button class="modal-fechar" onclick="fecharModalConfig()">✕</button>
      <div class="modal-titulo">⚙️ Gerenciar Técnicos</div>
      
      <div class="modal-secao">Cadastrar Novo</div>
      <div class="form-add-tecnico">
        <input type="text" class="input-add" id="nomeNovoTecnico" placeholder="Nome..." />
        <button class="btn-add" onclick="adicionarTecnico()">➕</button>
      </div>
      
      <div class="modal-divider"></div>
      <div class="modal-secao">Técnicos Ativos</div>
      <div class="lista-gerenciar" id="listaGerenciarTecnicos"></div>
    </div>
  </div>

  <div class="seletor-tecnico" id="seletorTecnico"></div>

  <div class="painel-tecnico oculto" id="painelTecnico">
    <button class="btn-trocar" onclick="trocarTecnico()">↩️ Voltar ao Painel Geral</button>
    <button class="btn-mostrar" id="btnMostrar" onclick="mostrarImportador()">📋 Mostrar campo da agenda</button>

    <div class="importador" id="importador">
      <textarea id="entrada" placeholder="Cole aqui a agenda completa..."></textarea>
      <button class="btn-gerar" onclick="gerarAgenda()">🚀 Gerar Agenda Inteligente</button>
    </div>

    <div class="cards" id="cards"></div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <button class="modal-fechar" onclick="fecharModal()">✕</button>
      <div class="modal-titulo">✏️ Editar OS</div>

      <div class="modal-secao">Dados Principais</div>
      <div class="campo-grupo"><label>Horário</label><input class="campo-input" id="edit-horario" type="text" /></div>
      <div class="campo-grupo"><label>Cliente</label><input class="campo-input" id="edit-cliente" type="text" /></div>
      <div class="campo-grupo"><label>Assunto</label><input class="campo-input" id="edit-assunto" type="text" /></div>
      <div class="campo-grupo"><label>Endereço</label><input class="campo-input" id="edit-endereco" type="text" /></div>
      <div class="campo-grupo"><label>Contato</label><input class="campo-input" id="edit-contato" type="text" /></div>

      <hr class="modal-divider" />
      <div class="modal-secao">Credenciais</div>

      <hr class="modal-divider" />

            <option value="">Aguardando status</option>
            <option value="rota">🚗 Em rota</option>

        <label style="color: #67e8f9;">📝 Observações / Motivo (Qualquer Status)</label>
        <textarea class="campo-textarea-modal" id="edit-observacao" placeholder="Digite as observações ou o motivo do encerramento aqui..."></textarea>

    <div class="modal">
      <button class="modal-fechar" onclick="fecharModalObsExpressa()">✕</button>
      <div class="modal-titulo" id="tit-obs-expressa">📝 Adicionar Observação</div>
      <p id="desc-obs-expressa" style="font-size:13.5px; color:#cbd5e1; margin-bottom:14px;"></p>
      
      <div class="campo-grupo">
        <textarea class="campo-textarea-modal" id="input-obs-expressa" placeholder="Escreva as observações finais desta OS..."></textarea>
      </div>
      <button class="btn-salvar-modal" onclick="salvarObsExpressa()">💾 Confirmar e Finalizar</button>
    </div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-texto" id="loadingTexto">Sincronizando...</div>
  </div>

  <div class="toast" id="toast">✅ Copiado com sucesso</div>

  <script>
    const API_URL = "https://68f458d8b16eb6f46834542c.mockapi.io/Rexord/Galeria";

    let listaTecnicos = [];
    let tecnicoAtual = null;
    let registroAtualId = null;
    let statusOS = {};
    let dadosOS = [];
    let osEditandoIndex = null;
    
    let statusTemporarioExpressado = null;
    let indexTemporarioExpressado = null;

    if(localStorage.getItem('lista_tecnicos_smart')) {
      try { listaTecnicos = JSON.parse(localStorage.getItem('lista_tecnicos_smart')); } catch(e){ listaTecnicos = []; }
    }

    function toggleLoading(exibir, mensagem = "Sincronizando...") {
      const overlay = document.getElementById("loadingOverlay");
      document.getElementById("loadingTexto").textContent = mensagem;
      if (exibir) overlay.classList.add("ativo");
      else overlay.classList.remove("ativo");
    }

    function toggleVisibilidadeSenha() {
      const input = document.getElementById("inputSenhaMaster");
      input.type = input.type === "password" ? "text" : "password";
    }

    function abrirModalSenha() {
      const overlay = document.getElementById("modalSenhaOverlay");
      const modal = document.getElementById("cardModalSenha");
      document.getElementById("erroSenhaMsg").style.display = "none";
      document.getElementById("inputSenhaMaster").value = "";
      modal.classList.remove("shake");
      overlay.style.display = "flex";
      setTimeout(() => { overlay.classList.add("aberto"); document.getElementById("inputSenhaMaster").focus(); }, 10);
    }

    function fecharModalSenha() {
      const overlay = document.getElementById("modalSenhaOverlay");
      overlay.classList.remove("aberto");
      setTimeout(() => overlay.style.display = "none", 300);
    }

    function verificarTeclaSenha(e) { if (e.key === "Enter") validarSenhaMaster(); }

    function validarSenhaMaster() {
      const input = document.getElementById("inputSenhaMaster");
      const modal = document.getElementById("cardModalSenha");

      if (input.value === "mikeadmin") {
        fecharModalSenha();
        abrirModalConfig();
      } else {
        modal.classList.remove("shake");
        void modal.offsetWidth;
        modal.classList.add("shake");
        document.getElementById("erroSenhaMsg").style.display = "block";
        setTimeout(() => { input.value = ""; input.focus(); }, 400);
      }
    }

    function abrirModalConfig() {
      const overlay = document.getElementById("modalConfigOverlay");
      overlay.style.display = "flex";
      setTimeout(() => overlay.classList.add("aberto"), 10);
      renderizarListaGerenciar();
    }

    function fecharModalConfig() {
      const overlay = document.getElementById("modalConfigOverlay");
      overlay.classList.remove("aberto");
      setTimeout(() => overlay.style.display = "none", 300);
    }

    document.getElementById("modalConfigOverlay").addEventListener("click", function(e) { if (e.target === this) fecharModalConfig(); });
    document.getElementById("modalSenhaOverlay").addEventListener("click", function(e) { if (e.target === this) fecharModalSenha(); });
    document.getElementById("modalOverlay").addEventListener("click", function(e) { if (e.target === this) fecharModal(); });
    document.getElementById("modalObsExpressaOverlay").addEventListener("click", function(e) { if (e.target === this) fecharModalObsExpressa(); });

    function toggleDropdown(tec, event) {
      if (event) event.stopPropagation();
      const container = document.getElementById(`atividades-${tec}`);
      const btn = document.getElementById(`btn-drop-${tec}`);
      if (container.classList.contains('visivel')) {
        container.classList.remove('visivel');
        setTimeout(() => container.style.display = 'none', 250);
        btn.innerHTML = 'Expandir 🔽';
      } else {
        container.style.display = 'flex';
        setTimeout(() => container.classList.add('visivel'), 10);
        btn.innerHTML = 'Recolher 🔼';
      }
    }

    function renderizarListaGerenciar() {
      const container = document.getElementById("listaGerenciarTecnicos");
      container.innerHTML = "";
      if(!listaTecnicos || listaTecnicos.length === 0) {
        container.innerHTML = `<div class="sem-atividade">Nenhum técnico cadastrado.</div>`;
        return;
      }
      listaTecnicos.forEach(tec => {
        const tecEscapado = String(tec).replace(/'/g, "\\'");
        container.innerHTML += `
          <div class="item-gerenciar">
            <span>👤 ${tec}</span>
            <div class="acoes-gerenciar-tec">
              <button class="btn-editar-tec-lista" onclick="editarNomeTecnico('${tecEscapado}')">✏️</button>
              <button class="btn-deletar-tec" onclick="removerTecnico('${tecEscapado}')">Excluir</button>
            </div>
          </div>
        `;
      });
    }

    async function editarNomeTecnico(nomeAntigo) {
      const novoNome = prompt(`Editar nome do técnico "${nomeAntigo}" para:`, nomeAntigo);
      if (novoNome === null) return;
      
      const nomeLimpo = novoNome.trim().replace(/[^a-zA-Z0-9 ]/g, "");
      if (!nomeLimpo) {
        alert("O nome do técnico não pode ficar em branco.");
        return;
      }

      if (nomeLimpo === nomeAntigo) return;

      if (listaTecnicos.includes(nomeLimpo)) {
        alert("Este nome de técnico já existe!");
        return;
      }

      fecharModalConfig();
      toggleLoading(true, `Atualizando ${nomeAntigo} para ${nomeLimpo}...`);

      try {
        const resp = await fetch(`${API_URL}?tecnico=${encodeURIComponent(nomeAntigo)}`);
        if(resp.ok) {
          const dados = await resp.json();
          if(dados && dados.length > 0) {
            const registro = dados[0];
            
            // Migrar chaves de status no localStorage se houverem
            if (registro.agenda) {
              const oसेस = parsearAgenda(registro.agenda);
              oसेस.forEach(os => {
                const statusSalvo = localStorage.getItem(`status_${nomeAntigo}_${os.id}`);
                const obsSalva = localStorage.getItem(`obs_${nomeAntigo}_${os.id}`);
                if (statusSalvo) {
                  localStorage.setItem(`status_${nomeLimpo}_${os.id}`, statusSalvo);
                  localStorage.removeItem(`status_${nomeAntigo}_${os.id}`);
                }
                if (obsSalva) {
                  localStorage.setItem(`obs_${nomeLimpo}_${os.id}`, obsSalva);
                  localStorage.removeItem(`obs_${nomeAntigo}_${os.id}`);
                }
                ['rota', 'concluido', 'nao-concluido'].forEach(st => {
                  const tm = localStorage.getItem(`timestamp_${nomeAntigo}_${os.id}_${st}`);
                  if (tm) {
                    localStorage.setItem(`timestamp_${nomeLimpo}_${os.id}_${st}`, tm);
                    localStorage.removeItem(`timestamp_${nomeAntigo}_${os.id}_${st}`);
                  }
                });
              });
            }

            // Atualizar na API preservando a agenda e status atuais
            await fetch(`${API_URL}/${registro.id}`, {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ tecnico: nomeLimpo })
            });
          }
        }

        // Atualizar lista local
        const idx = listaTecnicos.indexOf(nomeAntigo);
        if (idx !== -1) listaTecnicos[idx] = nomeLimpo;
        localStorage.setItem('lista_tecnicos_smart', JSON.stringify(listaTecnicos));

        if (tecnicoAtual === nomeAntigo) {
          tecnicoAtual = nomeLimpo;
          document.getElementById("subtitulo").textContent = `Agenda: ${nomeLimpo}`;
        }

        renderizarCardsMonitoramento();
        await carregarDashboardGeral();
        mostrarToast("💾 Nome atualizado!");
      } catch (e) {
        alert("Erro ao atualizar o nome do técnico na nuvem.");
      } finally {
        toggleLoading(false);
        abrirModalConfig();
      }
    }

    async function adicionarTecnico() {
      const input = document.getElementById("nomeNovoTecnico");
      const nome = input.value.trim().replace(/[^a-zA-Z0-9 ]/g, "");
      if(!nome) return;

      if(listaTecnicos.includes(nome)) {
        alert("Este técnico já existe!");
        return;
      }

      fecharModalConfig();
      toggleLoading(true, `Salvando técnico ${nome}...`);

      try {
        const payload = { tecnico: nome, agenda: "", status: JSON.stringify({}) };
        await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        listaTecnicos.push(nome);
        localStorage.setItem('lista_tecnicos_smart', JSON.stringify(listaTecnicos));
        input.value = "";
        
        renderizarCardsMonitoramento();
        await carregarDashboardGeral();
        mostrarToast("👤 Técnico adicionado!");
      } catch (e) {
        alert("Erro ao salvar técnico remoto.");
      } finally {
        toggleLoading(false);
        abrirModalConfig();
      }
    }

    async function removerTecnico(nome) {
      if(!confirm(`Tem certeza que deseja excluir o técnico ${nome}?`)) return;
      fecharModalConfig();
      toggleLoading(true, `Excluindo ${nome}...`);
      try {
        const resp = await fetch(`${API_URL}?tecnico=${encodeURIComponent(nome)}`);
        if(resp.ok) {
          const dados = await resp.json();
          if(dados && dados.length > 0) {
            await fetch(`${API_URL}/${dados[0].id}`, { method: "DELETE" });
          }
        }
      } catch(e) { console.warn(e); }

      listaTecnicos = listaTecnicos.filter(t => t !== nome);
      localStorage.setItem('lista_tecnicos_smart', JSON.stringify(listaTecnicos));

      renderizarCardsMonitoramento();
      await carregarDashboardGeral();
      toggleLoading(false);
      abrirModalConfig();
      mostrarToast("❌ Técnico removido!");
    }

    function renderizarCardsMonitoramento() {
      const container = document.getElementById("seletorTecnico");
      container.innerHTML = "";
      if(!listaTecnicos || listaTecnicos.length === 0) {
        container.innerHTML = `<div class="sem-atividade" style="padding:40px; background:rgba(255,255,255,0.02); border-radius:20px;">Nenhum técnico ativo. Adicione um no painel superior!</div>`;
        return;
      }
      listaTecnicos.forEach(tec => {
        container.innerHTML += `
          <div class="card-monitor" id="card-monitor-${tec}">
            <div class="monitor-header">
              <div class="monitor-info-esquerda" onclick="selecionarTecnico('${tec}')">
                <div class="monitor-nome">👤 ${tec}</div>
                <div class="status-preview" id="preview-${tec}"></div>
              </div>
              <button class="btn-dropdown" id="btn-drop-${tec}" onclick="toggleDropdown('${tec}', event)">Expandir 🔽</button>
            </div>
            <div class="monitor-atividades" id="atividades-${tec}">
               <div class="sem-atividade">Nenhuma rota activa no momento.</div>
            </div>
          </div>
        `;
      });
    }

    async function abrirModalDeAtividadeRemota(nomeTecnico, osId) {
      toggleLoading(true, "Carregando dados da O.S...");
      try {
        const resp = await fetch(`${API_URL}?tecnico=${encodeURIComponent(nomeTecnico)}`);
        if(!resp.ok) throw new Error();
        const dados = await resp.json();
        
        if (dados && dados.length > 0) {
          const registro = dados[0];
          tecnicoAtual = nomeTecnico;
          registroAtualId = registro.id;
          dadosOS = parsearAgenda(registro.agenda || "");

          if (registro.status) {
            try {
              const statusSalvo = JSON.parse(registro.status);
              Object.keys(statusSalvo).forEach(idKey => {
                if (typeof statusSalvo[idKey] === 'object') {
                  localStorage.setItem(`status_${tecnicoAtual}_${idKey}`, statusSalvo[idKey].status || "");
                  localStorage.setItem(`obs_${tecnicoAtual}_${idKey}`, statusSalvo[idKey].obs || "");
                  localStorage.setItem(`timestamp_${tecnicoAtual}_${idKey}_${statusSalvo[idKey].status}`, statusSalvo[idKey].timestamp || "--:--");
                } else {
                  localStorage.setItem(`status_${tecnicoAtual}_${idKey}`, statusSalvo[idKey]);
                }
              });
            } catch(e) {}
          }

          const targetIndex = dadosOS.findIndex(os => os.id === String(osId));
          if (targetIndex !== -1) {
            toggleLoading(false);
            abrirModal(targetIndex);
          } else {
            alert("Ordem de serviço não encontrada na agenda ativa deste técnico.");
            toggleLoading(false);
          }
        } else {
          toggleLoading(false);
        }
      } catch(e) {
        console.error(e);
        toggleLoading(false);
        alert("Erro ao buscar dados remotos da atividade.");
      }
    }

    async function carregarDashboardGeral() {
      if(!listaTecnicos) return;
      for(const tec of listaTecnicos) {
        try {
          const resp = await fetch(`${API_URL}?tecnico=${encodeURIComponent(tec)}`);
          if (!resp.ok) throw new Error();
          const dados = await resp.json();
          
          let emRota = 0, concluidas = 0, naoConcluidas = 0, aguardando = 0;
          let logsHtml = "";

          if (dados && dados.length > 0 && dados[0].agenda) {
            const registro = dados[0];
            const listaOS = parsearAgenda(registro.agenda);
            
            let statusSalvo = {};
            if (registro.status) {
              try { statusSalvo = JSON.parse(registro.status); } catch(e){}
            }

            Object.keys(statusSalvo).forEach(osId => {
              if (typeof statusSalvo[osId] === 'object') {
                localStorage.setItem(`status_${tec}_${osId}`, statusSalvo[osId].status || "");
                localStorage.setItem(`obs_${tec}_${osId}`, statusSalvo[osId].obs || "");
                localStorage.setItem(`timestamp_${tec}_${osId}_${statusSalvo[osId].status}`, statusSalvo[osId].timestamp || "--:--");
              } else {
                localStorage.setItem(`status_${tec}_${osId}`, statusSalvo[osId]);
              }
            });

            listaOS.forEach(itemOS => {
              const statusAtual = localStorage.getItem(`status_${tec}_${itemOS.id}`);
              const osIdLimpo = String(itemOS.id).replace(/"/g, '"');
              const tecLimpo = String(tec).replace(/"/g, '"');
              const obsSalva = localStorage.getItem(`obs_${tec}_${itemOS.id}`) || "";

              if (statusAtual === 'rota') {
                const horaLog = localStorage.getItem(`timestamp_${tec}_${itemOS.id}_rota`) || '--:--';
                emRota++;
                logsHtml += `
                  <div class="log-atividade" onclick="abrirModalDeAtividadeRemota('${tecLimpo}', '${osIdLimpo}')">
                    <span class="log-badge rota">🚗 Em rota</span>
                    <div class="log-info"><strong>${escapeHtml(itemOS.cliente)}</strong><span class="tipo-servico">📋 ${escapeHtml(itemOS.assunto)}</span></div>
                    <div class="log-hora">⏰ ${horaLog}</div>
                  </div>
                `;
              } else if (statusAtual === 'concluido') {
                const horaLog = localStorage.getItem(`timestamp_${tec}_${itemOS.id}_concluido`) || '--:--';
                concluidas++;
                logsHtml += `
                  <div class="log-atividade" onclick="abrirModalDeAtividadeRemota('${tecLimpo}', '${osIdLimpo}')">
                    <span class="log-badge concluido">✅ Concluído</span>
                    <div class="log-info">
                      <strong>${escapeHtml(itemOS.cliente)}</strong><span class="tipo-servico">📋 ${escapeHtml(itemOS.assunto)}</span>
                      ${obsSalva ? `<span class="obs-texto" style="color:#4ade80; background:rgba(34,197,94,0.06); border-left-color:#22c55e;">📝 Obs: ${escapeHtml(obsSalva)}</span>` : ''}
                    </div>
                    <div class="log-hora">⏰ ${horaLog}</div>
                  </div>
                `;
              } else if (statusAtual === 'nao-concluido') {
                const horaLog = localStorage.getItem(`timestamp_${tec}_${itemOS.id}_nao-concluido`) || '--:--';
                naoConcluidas++;
                logsHtml += `
                  <div class="log-atividade" onclick="abrirModalDeAtividadeRemota('${tecLimpo}', '${osIdLimpo}')">
                    <span class="log-badge nao-concluido">❌ Mal Sucedida</span>
                    <div class="log-info">
                      <strong>${escapeHtml(itemOS.cliente)}</strong><span class="tipo-servico">📋 ${escapeHtml(itemOS.assunto)}</span>
                      ${obsSalva ? `<span class="obs-texto">⚠️ Motivo: ${escapeHtml(obsSalva)}</span>` : ''}
                    </div>
                    <div class="log-hora">⏰ ${horaLog}</div>
                  </div>
                `;
              } else {
                aguardando++;
                logsHtml += `
                  <div class="log-atividade" onclick="abrirModalDeAtividadeRemota('${tecLimpo}', '${osIdLimpo}')">
                    <span class="log-badge aguardando">⏳ Pendente</span>
                    <div class="log-info"><strong>${escapeHtml(itemOS.cliente)}</strong><span class="tipo-servico">📋 ${escapeHtml(itemOS.assunto)}</span></div>
                    <div class="log-hora">Pendente</div>
                  </div>
                `;
              }
            });
          }

          const preview = document.getElementById(`preview-${tec}`);
          if(preview) {
            let htmlContador = '';
            if (emRota > 0) htmlContador += `<span class="preview-rota">🚗 ${emRota}</span>`;
            if (concluidas > 0) htmlContador += `<span class="preview-concluido">✅ ${concluidas}</span>`;
            if (naoConcluidas > 0) htmlContador += `<span class="preview-nao-concluido">❌ ${naoConcluidas}</span>`;
            if (aguardando > 0) htmlContador += `<span class="preview-aguardando">⏳ ${aguardando}</span>`;
            preview.innerHTML = htmlContador || '<span style="color:#64748b">Sem atividades</span>';
          }

          const containerAtividades = document.getElementById(`atividades-${tec}`);
          if(containerAtividades) {
            containerAtividades.innerHTML = logsHtml || `<div class="sem-atividade">Nenhuma O.S. configurada no sistema.</div>`;
          }

        } catch(e) { console.warn(e); }
      }
    }

    async function selecionarTecnico(nome) {
      tecnicoAtual = nome;
      document.getElementById("subtitulo").textContent = `Agenda: ${nome}`;
      document.getElementById("seletorTecnico").classList.add("oculto");
      document.getElementById("painelTecnico").classList.remove("oculto");
      
      document.getElementById("cards").innerHTML = "";
      document.getElementById("entrada").value = "";

      toggleLoading(true, "Buscando agenda...");
      try {
        const resp = await fetch(`${API_URL}?tecnico=${encodeURIComponent(tecnicoAtual)}`);
        if(!resp.ok) throw new Error();
        const dados = await resp.json();
        
        if (dados && dados.length > 0) {
          const registro = dados[0];
          registroAtualId = registro.id;
          document.getElementById("entrada").value = registro.agenda || "";
          
          if (registro.status) {
            try {
              const statusSalvo = JSON.parse(registro.status);
              Object.keys(statusSalvo).forEach(osId => {
                if (typeof statusSalvo[osId] === 'object') {
                  localStorage.setItem(`status_${tecnicoAtual}_${osId}`, statusSalvo[osId].status || "");
                  localStorage.setItem(`obs_${tecnicoAtual}_${osId}`, statusSalvo[osId].obs || "");
                  localStorage.setItem(`timestamp_${tecnicoAtual}_${osId}_${statusSalvo[osId].status}`, statusSalvo[osId].timestamp || "--:--");
                } else {
                  localStorage.setItem(`status_${tecnicoAtual}_${osId}`, statusSalvo[osId]);
                }
              });
            } catch(e) {}
          }

          if (registro.agenda) {
            criarCards(registro.agenda);
            document.getElementById("importador").classList.add("oculto");
            document.getElementById("btnMostrar").style.display = "block";
          } else { abrirModoVazio(); }
        } else { abrirModoVazio(); }
      } catch (e) { abrirModoVazio(); } finally { toggleLoading(false); }
    }

    function abrirModoVazio() {
      registroAtualId = null;
      document.getElementById("importador").classList.remove("oculto");
      document.getElementById("btnMostrar").style.display = "none";
      document.getElementById("cards").innerHTML = `<div class="sem-atividade" style="width:100%">Nenhuma O.S. configurada para este técnico.</div>`;
    }

    function trocarTecnico() {
      tecnicoAtual = null;
      registroAtualId = null;
      statusOS = {};
      dadosOS = [];
      document.getElementById("subtitulo").textContent = "Toque no painel do técnico para ver a agenda";
      document.getElementById("seletorTecnico").classList.remove("oculto");
      document.getElementById("painelTecnico").classList.add("oculto");
      carregarDashboardGeral();
    }

    async function salvarAgendaNaApi(texto, messageSilenciosa = false) {
      if(!messageSilenciosa) toggleLoading(true, "Salvando alterações...");
      
      const statusParaSalvar = {};
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.startsWith(`status_${tecnicoAtual}_`)) {
          const osId = key.replace(`status_${tecnicoAtual}_`, "");
          const statusVal = localStorage.getItem(key);
          const obsVal = localStorage.getItem(`obs_${tecnicoAtual}_${osId}`) || "";
          const timeVal = localStorage.getItem(`timestamp_${tecnicoAtual}_${osId}_${statusVal}`) || "--:--";

          statusParaSalvar[osId] = { status: statusVal, obs: obsVal, timestamp: timeVal };
        }
      }

      try {
        const payload = { tecnico: tecnicoAtual, agenda: texto, status: JSON.stringify(statusParaSalvar) };

        if (registroAtualId) {
          await fetch(`${API_URL}/${registroAtualId}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
        } else {
          const resp = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
          const criado = await resp.json();
          registroAtualId = criado.id;
        }
      } catch (e) { mostrarToast("❌ Erro ao sincronizar nuvem."); } finally { if(!messageSilenciosa) toggleLoading(false); }
    }

    function gerarAgenda() {
      const texto = document.getElementById("entrada").value.trim();
      if (!texto) return;
      criarCards(texto);
      salvarAgendaNaApi(texto);
      document.getElementById("importador").classList.add("oculto");
      document.getElementById("btnMostrar").style.display = "block";
    }

    function parsearAgenda(texto) {
      const blocks = texto.split(/ID:\s*/i).slice(1);
      return blocks.map(bloco => ({
        id:        bloco.match(/^(\d+)/)?.[1]?.trim()                          || "Sem ID",
        cliente:   bloco.match(/Cliente:\s*(.*)/i)?.[1]?.trim()                || "Cliente não informado",
        horario:   bloco.match(/Horário:\s*(.*)/i)?.[1]?.trim()                || "",
        endereco:  bloco.match(/Endereço:\s*(.*)/i)?.[1]?.trim()               || "",
        login:     bloco.match(/Login:\s*(.*)/i)?.[1]?.trim()                  || "",
        senha:     bloco.match(/Senha\s*(?:do\s*)?(?:PPPoE)?:\s*(.*)/i)?.[1]?.trim() || "",
        contato:   bloco.match(/Contato:\s*(.*)/i)?.[1]?.trim()                || "",
        assunto:   bloco.match(/Assunto:\s*(.*)/i)?.[1]?.trim()                || "Sem assunto"
      }));
    }

    function serializarAgenda(lista) {
      return lista.map(os => (
        `ID: ${os.id}\n` +
        `Horário: ${os.horario}\n` +
        `Cliente: ${os.cliente}\n` +
        `Assunto: ${os.assunto}\n` +
        `Endereço: ${os.endereco}\n` +
        `Login: ${os.login}\n` +
        `Senha: ${os.senha}\n` +
        `Contato: ${os.contato}`
      )).join("\n\n");
    }

    function escapeHtml(str) {
      if(!str) return "";
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function criarCards(texto) {
      dadosOS = parsearAgenda(texto);
      const cardsContainer = document.getElementById("cards");
      cardsContainer.innerHTML = "";

      if(dadosOS.length === 0) {
        cardsContainer.innerHTML = `<div class="sem-atividade" style="width:100%">Nenhuma O.S. encontrada.</div>`;
        return;
      }

      dadosOS.forEach((os, idx) => {
        const enderecoLimpo = (os.endereco || "").replace(/\?/g, "").replace(/\s+/g, " ").trim();
        const maps = `https://maps.google.com/?q=${encodeURIComponent(enderecoLimpo)}`;
        const loginSeguro = escapeHtml(os.login);
        const senhaSegura = escapeHtml(os.senha);
        const contatoSeguro = escapeHtml(os.contato);
        
        const statusSalvo = localStorage.getItem(`status_${tecnicoAtual}_${os.id}`) || "";
        const obsSalva = localStorage.getItem(`obs_${tecnicoAtual}_${os.id}`) || "";

        let statusClass = "vazio";
        let statusTxt = "Aguardando status";
        if (statusSalvo === "rota") { statusClass = "rota"; statusTxt = "🚗 Em rota"; }
        else if (statusSalvo === "concluido") { statusClass = "concluido"; statusTxt = "✅ Concluído"; }
        else if (statusSalvo === "nao-concluido") { statusClass = "nao-concluido"; statusTxt = "❌ Não concluído"; }

        let obsHtmlExpressa = '';
        if(obsSalva) {
          const extraClass = (statusSalvo === 'concluido') ? ' concluida-obs' : '';
          obsHtmlExpressa = `<div class="card-obs-preview${extraClass}" id="obs-preview-${os.id}">📝 Obs: ${escapeHtml(obsSalva)}</div>`;
        }

        cardsContainer.innerHTML += `
          <div class="card" data-idx="${idx}" data-id="${os.id}" data-cliente="${escapeHtml(os.cliente)}" data-maps="${escapeHtml(maps)}" data-endereco="${escapeHtml(enderecoLimpo)}">
            <button class="btn-editar-os" onclick="abrirModal(${idx})">✏️</button>
            
            <div class="card-top-header">
              <div class="horario">🕒 ${os.horario}</div>
              <div class="card-status-topo ${statusClass}" id="topo-status-badge-${os.id}">${statusTxt}</div>
            </div>

            <div class="cliente">${escapeHtml(os.cliente)}</div>
            <div class="info"><strong>🔹 O.S:</strong> <span class="os-number">${os.id}</span></div>
            <div class="assunto">📋 ${escapeHtml(os.assunto)}</div>
            <div class="info"><strong>📍 Endereço:</strong><br>${escapeHtml(enderecoLimpo)}</div>

            <div class="info-linha">
              <div class="info"><strong>🔐 Login:</strong> ${loginSeguro || " "}</div>
              <button class="btn-copiar" data-copiar="${loginSeguro}" title="Copiar login">📋</button>
            </div>
            <div class="info-linha">
              <div class="info"><strong>🔑 Senha:</strong> ${senhaSegura || " "}</div>
              <button class="btn-copiar" data-copiar="${senhaSegura}" title="Copiar senha">📋</button>
            </div>
            <div class="info-linha">
              <div class="info"><strong>📞 Contato:</strong> ${contatoSeguro || " "}</div>
              <button class="btn-copiar" data-copiar="${contatoSeguro}" title="Copiar contato">📋</button>
            </div>

            <div class="botoes-grupo-novo">
              <div class="btn-links-linha">
                <button class="btn-acao-mobile btn-maps-mob" onclick="window.open('${escapeHtml(maps)}', '_blank')">🗺️ Maps</button>
                <button class="btn-acao-mobile btn-ativo-mob" onclick="window.open('https://sistema.ativotelecom.com.br/central_assinante_web/login', '_blank')">🌐 Ativo</button>
              </div>
              
              <div class="seletor-status-container">
                <select class="select-status-unico" id="select-status-os-${idx}" onchange="dispararAlteracaoStatus(${idx}, this.value)">
                  <option value="" ${statusSalvo===''?'selected':''}>⏳ Alterar Status...</option>
                  <option value="rota" ${statusSalvo==='rota'?'selected':''}>🚗 Iniciar Rota</option>
                  <option value="concluido" ${statusSalvo==='concluido'?'selected':''}>✅ Concluído OS</option>
                  <option value="nao-concluido" ${statusSalvo==='nao-concluido'?'selected':''}>❌ Não Executada / Falha</option>
                </select>
              </div>
            </div>
            <div id="container-obs-preview-box-${os.id}">${obsHtmlExpressa}</div>
          </div>
        `;
      });

      iniciarEventosCopiarNativos();
    }

    function iniciarEventosCopiarNativos() {
      document.querySelectorAll(".btn-copiar").forEach(btn => {
        btn.onclick = function() {
          const valor = btn.dataset.copiar || "";
          if (!valor) return;
          navigator.clipboard.writeText(valor).then(() => {
            mostrarToast("✅ Copiado com sucesso!");
          });
        };
      });
    }

    function obtenerHoraAtual() {
      const agora = new Date();
      return agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    }

    function dispararAlteracaoStatus(idx, novoStatus) {
      const os = dadosOS[idx];
      
      if (!novoStatus) {
        localStorage.removeItem(`status_${tecnicoAtual}_${os.id}`);
        atualizarLayoutCardStatus(os.id, "", "Aguardando status");
        salvarAgendaNaApi(document.getElementById("entrada").value, true);
        return;
      }

      if (novoStatus === "rota") {
        localStorage.setItem(`status_${tecnicoAtual}_${os.id}`, "rota");
        localStorage.setItem(`timestamp_${tecnicoAtual}_${os.id}_rota`, obtenerHoraAtual());
        atualizarLayoutCardStatus(os.id, "rota", "🚗 Em rota");
        salvarAgendaNaApi(document.getElementById("entrada").value, true);

        const script = `🚗 EM ROTA\n\n👤 Cliente: ${os.cliente}\n📍 Endereço: ${os.endereco}`;
        navigator.clipboard.writeText(script).then(() => {
          mostrarToast("✅ Rota Copiada!");
          window.open("https://t.me/c/1989058391/167773", "_blank");
        });
      } 
      else if (novoStatus === "concluido" || novoStatus === "nao-concluido") {
        statusTemporarioExpressado = novoStatus;
        indexTemporarioExpressado = idx;
        
        const overlay = document.getElementById("modalObsExpressaOverlay");
        const titulo = document.getElementById("tit-obs-expressa");
        const desc = document.getElementById("desc-obs-expressa");
        const input = document.getElementById("input-obs-expressa");
        
        input.value = localStorage.getItem(`obs_${tecnicoAtual}_${os.id}`) || "";
        
        if(novoStatus === "concluido") {
          titulo.innerText = "✅ Concluir Ordem de Serviço";
          desc.innerText = "Insira as observações técnicas de encerramento da OS (Opcional):";
        } else {
          titulo.innerText = "❌ Finalizar como Não Concluída";
          desc.innerText = "Insira detalhadamente o motivo/justificativa pelo qual a OS não foi executada (Obrigatório):";
        }
        
        overlay.style.display = "flex";
        setTimeout(() => { overlay.classList.add("aberto"); input.focus(); }, 10);
      }
    }

    function fecharModalObsExpressa() {
      const overlay = document.getElementById("modalObsExpressaOverlay");
      overlay.classList.remove("aberto");
      setTimeout(() => { 
        overlay.style.display = "none";
        if(indexTemporarioExpressado !== null) {
          const statusSalvoOriginal = localStorage.getItem(`status_${tecnicoAtual}_${dadosOS[indexTemporarioExpressado].id}`) || "";
          document.getElementById(`select-status-os-${indexTemporarioExpressado}`).value = statusSalvoOriginal;
        }
        statusTemporarioExpressado = null;
        indexTemporarioExpressado = null;
      }, 300);
    }

    function salvarObsExpressa() {
      if (indexTemporarioExpressado === null || !statusTemporarioExpressado) return;
      
      const os = dadosOS[indexTemporarioExpressado];
      const osIdLimpo = os.id;
      const obsTexto = document.getElementById("input-obs-expressa").value.trim();

      if(statusTemporarioExpressado === "nao-concluido" && !obsTexto) {
        alert("Por favor, digite um motivo para a não conclusão.");
        return;
      }

      localStorage.setItem(`status_${tecnicoAtual}_${os.id}`, statusTemporarioExpressado);
      localStorage.setItem(`timestamp_${tecnicoAtual}_${os.id}_${statusTemporarioExpressado}`, obtenerHoraAtual());

      if(obsTexto) {
        localStorage.setItem(`obs_${tecnicoAtual}_${os.id}`, obsTexto);
      } else {
        localStorage.removeItem(`obs_${tecnicoAtual}_${os.id}`);
      }

      const txtStatus = statusTemporarioExpressado === "concluido" ? "✅ Concluído" : "❌ Não concluído";
      atualizarLayoutCardStatus(os.id, statusTemporarioExpressado, txtStatus);
      
      const previewBox = document.getElementById(`container-obs-preview-box-${os.id}`);
      if(obsTexto) {
        const extraClass = (statusTemporarioExpressado === 'concluido') ? ' concluida-obs' : '';
        previewBox.innerHTML = `<div class="card-obs-preview${extraClass}" id="obs-preview-${os.id}">📝 Obs: ${escapeHtml(obsTexto)}</div>`;
      } else {
        previewBox.innerHTML = '';
      }

      fecharModalObsExpressa();
      salvarAgendaNaApi(document.getElementById("entrada").value, false);
      mostrarToast("💾 Status atualizado!");
    }

    function atualizarLayoutCardStatus(osId, classeStatus, textoStatus) {
      const badge = document.getElementById(`topo-status-badge-${osId}`);
      if(badge) {
        badge.className = `card-status-topo ${classeStatus || 'vazio'}`;
        badge.innerText = textoStatus;
      }
    }

    function abrirModal(idx) {
      osEditandoIndex = idx;
      const os = dadosOS[idx];

      document.getElementById("edit-horario").value  = os.horario  || "";
      document.getElementById("edit-cliente").value  = os.cliente  || "";
      document.getElementById("edit-assunto").value  = os.assunto  || "";
      document.getElementById("edit-endereco").value = os.endereco || "";
      document.getElementById("edit-login").value    = os.login     || "";
      document.getElementById("edit-senha").value    = os.senha     || "";
      document.getElementById("edit-contato").value  = os.contato   || "";
      
      document.getElementById("edit-observacao").value = localStorage.getItem(`obs_${tecnicoAtual}_${os.id}`) || "";
      document.getElementById("edit-status").value = localStorage.getItem(`status_${tecnicoAtual}_${os.id}`) || "";
      
      const overlay = document.getElementById("modalOverlay");
      overlay.style.display = "flex";
      setTimeout(() => overlay.classList.add("aberto"), 10);
    }

    function fecharModal() {
      const overlay = document.getElementById("modalOverlay");
      overlay.classList.remove("aberto");
      setTimeout(() => { overlay.style.display = "none"; osEditandoIndex = null; }, 300);
    }

    async function salvarEdicaoOS() {
      if (osEditandoIndex === null) return;

      const os = dadosOS[osEditandoIndex];
      os.horario  = document.getElementById("edit-horario").value.trim();
      os.cliente  = document.getElementById("edit-cliente").value.trim();
      os.assunto  = document.getElementById("edit-assunto").value.trim();
      os.endereco = document.getElementById("edit-endereco").value.trim();
      os.login    = document.getElementById("edit-login").value.trim();
      os.senha    = document.getElementById("edit-senha").value.trim();
      os.contato  = document.getElementById("edit-contato").value.trim();

      const novaObs = document.getElementById("edit-observacao").value.trim();
      if(novaObs) { localStorage.setItem(`obs_${tecnicoAtual}_${os.id}`, novaObs); } 
      else { localStorage.removeItem(`obs_${tecnicoAtual}_${os.id}`); }

      const novoStatus = document.getElementById("edit-status").value;
      if (novoStatus) {
        localStorage.setItem(`status_${tecnicoAtual}_${os.id}`, novoStatus);
        localStorage.setItem(`timestamp_${tecnicoAtual}_${os.id}_${novoStatus}`, obtenerHoraAtual());
      } else { localStorage.removeItem(`status_${tecnicoAtual}_${os.id}`); }

      const novoTexto = serializarAgenda(dadosOS);
      document.getElementById("entrada").value = novoTexto;
      
      fecharModal();
      await salvarAgendaNaApi(novoTexto);
      criarCards(novoTexto);
      mostrarToast("💾 OS Atualizada!");
    }

    function mostrarToast(msg) {
      const toast = document.getElementById("toast");
      toast.textContent = msg;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2600);
    }

    function mostrarImportador() {
      document.getElementById("importador").classList.remove("oculto");
      document.getElementById("btnMostrar").style.display = "none";
    }

    async function sincronizarTecnicosDaApi() {
      renderizarCardsMonitoramento();
      carregarDashboardGeral();

      toggleLoading(true, "Carregando painel remoto...");
      try {
        const resp = await fetch(API_URL);
        if(resp.ok) {
          const dados = await resp.json();
          if (dados && dados.length > 0) {
            const nomesApi = dados.map(d => d.tecnico).filter(t => t);
            if(nomesApi.length > 0) {
              listaTecnicos = nomesApi;
              localStorage.setItem('lista_tecnicos_smart', JSON.stringify(listaTecnicos));
            }
          }
        }
      } catch (e) { 
        console.warn("Usando cache local."); 
      } finally {
        renderizarCardsMonitoramento();
        carregarDashboardGeral();
        toggleLoading(false);
      }
    }

    window.onload = function() { sincronizarTecnicosDaApi(); };
  </script>
</body>
</html>
