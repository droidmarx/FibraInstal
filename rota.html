<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda Técnico Inteligente</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #0f172a 0%, #020617 75%);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
      padding: 20px;
    }

    .topo {
      margin-bottom: 24px;
      text-align: center;
    }

    .topo h1 {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(90deg, #22d3ee, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .topo p {
      color: #94a3b8;
      font-size: 15.5px;
      margin-top: 4px;
    }

    /* Botão de Configuração Principal */
    .btn-config {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #cbd5e1;
      font-size: 13.5px;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: 12px;
      cursor: pointer;
      margin: 12px auto 0;
      display: block;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-config:hover {
      background: rgba(34, 211, 238, 0.1);
      border-color: rgba(34, 211, 238, 0.3);
      color: white;
      transform: scale(1.03);
    }

    /* Lista dentro do Modal de Técnicos */
    .form-add-tecnico {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
    }

    .input-add {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 14.5px;
      color: white;
      outline: none;
      flex: 1;
      transition: all 0.2s;
    }

    .input-add:focus {
      border-color: rgba(34, 211, 238, 0.45);
      background: rgba(34, 211, 238, 0.05);
    }

    .btn-add {
      background: linear-gradient(135deg, #22d3ee, #3b82f6);
      border: none;
      color: white;
      font-weight: 700;
      padding: 12px 20px;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-add:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(34, 211, 238, 0.3);
    }

    .lista-gerenciar {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 240px;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.2);
      padding: 12px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .item-gerenciar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 15px;
      color: #cbd5e1;
      padding: 8px 12px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.03);
      animation: fadeInItem 0.25s ease-out forwards;
    }

    @keyframes fadeInItem {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .btn-deletar-tec {
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.25);
      color: #f87171;
      font-size: 11.5px;
      font-weight: 700;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-deletar-tec:hover {
      background: #ef4444;
      color: white;
      border-color: #ef4444;
    }

    /* Estrutura de Layout e Cards */
    .seletor-tecnico {
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 600px;
      margin: 0 auto 32px;
    }

    .seletor-tecnico.oculto {
      display: none !important;
    }

    .card-monitor {
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(20px);
      border-radius: 28px;
      padding: 24px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      position: relative;
    }

    .card-monitor:hover {
      border-color: rgba(34, 211, 238, 0.3);
      background: rgba(255, 255, 255, 0.07);
      transform: translateY(-2px);
    }

    .monitor-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding-bottom: 12px;
    }

    .monitor-info-esquerda {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      flex: 1;
    }

    .monitor-nome {
      font-size: 20px;
      font-weight: 800;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .status-preview span {
      font-size: 12px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 999px;
    }

    .preview-rota { background: rgba(234, 179, 8, 0.2); color: #fde047; border: 1px solid rgba(234, 179, 8, 0.3); }
    .preview-concluido { background: rgba(74, 222, 128, 0.2); color: #4ade80; border: 1px solid rgba(74, 222, 128, 0.3); }
    .preview-nao-concluido { background: rgba(244, 63, 94, 0.2); color: #f87171; border: 1px solid rgba(244, 63, 94, 0.3); }
    .preview-aguardando { background: rgba(148, 163, 184, 0.15); color: #94a3b8; border: 1px solid rgba(148, 163, 184, 0.25); }

    .btn-dropdown {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #94a3b8;
      font-size: 14px;
      font-weight: 700;
      padding: 6px 12px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-dropdown:hover {
      background: rgba(255, 255, 255, 0.12);
      color: white;
    }

    .monitor-atividades {
      display: none;
      flex-direction: column;
      gap: 10px;
      opacity: 0;
      transform: translateY(-8px);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .monitor-atividades.visivel {
      display: flex;
      opacity: 1;
      transform: translateY(0);
    }

    .log-atividade {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: rgba(0, 0, 0, 0.2);
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
    }

    .log-badge {
      font-weight: 700;
      font-size: 11px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 6px;
      white-space: nowrap;
      margin-top: 2px;
    }

    .log-badge.rota { background: #eab308; color: #020617; }
    .log-badge.concluido { background: #22c55e; color: #020617; }
    .log-badge.nao-concluido { background: #ef4444; color: #ffffff; }
    .log-badge.aguardando { background: #64748b; color: #f8fafc; }

    .log-info {
      flex: 1;
      color: #cbd5e1;
      line-height: 1.4;
    }

    .log-info strong { color: white; }
    .log-info .tipo-servico { color: #a5b4fc; font-size: 13px; display: block; margin-top: 2px; }
    .log-info .obs-texto { color: #f87171; font-size: 12.5px; display: block; margin-top: 4px; font-style: italic; background: rgba(244, 63, 94, 0.08); padding: 6px 10px; border-radius: 8px; border-left: 3px solid #ef4444; }

    .log-hora {
      font-size: 12px;
      color: #64748b;
      font-weight: 700;
      background: rgba(255,255,255,0.05);
      padding: 4px 8px;
      border-radius: 8px;
      align-self: center;
    }

    .sem-atividade {
      color: #64748b;
      font-size: 14px;
      font-style: italic;
      text-align: center;
      padding: 8px 0;
    }

    .painel-tecnico.oculto { display: none !important; }

    .btn-trocar {
      display: block;
      margin: 0 auto 20px;
      border: none;
      background: none;
      color: #67e8f9;
      font-size: 14.5px;
      font-weight: 700;
      cursor: pointer;
      padding: 6px 10px;
    }

    .importador {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      border-radius: 28px;
      padding: 28px;
      margin-bottom: 32px;
    }

    .importador.oculto {
      display: none !important;
    }

    textarea {
      width: 100%;
      min-height: 260px;
      resize: vertical;
      border: none;
      outline: none;
      border-radius: 24px;
      padding: 22px;
      font-size: 15.5px;
      background: rgba(255, 255, 255, 0.07);
      color: white;
      line-height: 1.65;
    }

    .btn-gerar {
      width: 100%;
      margin-top: 20px;
      border: none;
      padding: 18px;
      border-radius: 20px;
      font-size: 16.5px;
      font-weight: 700;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #22d3ee, #3b82f6);
      box-shadow: 0 10px 20px rgba(34, 211, 238, 0.2);
    }

    .btn-mostrar {
      display: none;
      width: 100%;
      margin-bottom: 20px;
      border: none;
      padding: 16px;
      border-radius: 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      color: white;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .cards {
      display: flex;
      gap: 24px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      padding-bottom: 20px;
    }

    .card {
      min-width: 360px;
      max-width: 360px;
      flex-shrink: 0;
      scroll-snap-align: center;
      border-radius: 32px;
      padding: 26px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      transition: all 0.4s ease;
      position: relative;
    }

    .card:hover { transform: translateY(-8px); }

    .btn-editar-os {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 36px;
      height: 36px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: #a5b4fc;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s;
      z-index: 2;
    }

    .btn-editar-os:hover {
      background: rgba(165, 180, 252, 0.2);
      color: #c4b5fd;
      border-color: rgba(165,180,252,0.35);
      transform: scale(1.08);
    }

    .horario {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 999px;
      background: linear-gradient(90deg, #22d3ee, #3b82f6);
      font-size: 14.5px;
      font-weight: 700;
      margin-bottom: 18px;
    }

    .cliente { font-size: 24px; font-weight: 800; margin-bottom: 16px; padding-right: 44px; }

    .info {
      color: #cbd5e1;
      line-height: 1.65;
      margin: 10px 0;
      font-size: 15px;
    }

    .info strong { color: #e0f2fe; }

    .info-linha {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 10px 0;
    }

    .btn-copiar {
      flex-shrink: 0;
      border: none;
      width: 34px;
      height: 34px;
      border-radius: 10px;
      cursor: pointer;
      color: #67e8f9;
      background: rgba(103, 232, 249, 0.12);
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s;
    }

    .btn-copiar:hover { background: rgba(103, 232, 249, 0.22); transform: translateY(-1px); }

    .os-number {
      font-size: 17px;
      font-weight: 800;
      color: #67e8f9;
      background: rgba(103, 232, 249, 0.12);
      padding: 4px 12px;
      border-radius: 8px;
    }

    .assunto {
      font-size: 14.5px;
      color: #a5b4fc;
      background: rgba(165, 180, 252, 0.1);
      padding: 6px 12px;
      border-radius: 8px;
      margin: 8px 0;
    }

    .botoes-grupo {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn-links { display: flex; gap: 12px; }

    .btn-maps, .btn-ativo, .btn-status-rota, .btn-status-falha {
      border: none;
      padding: 15px;
      border-radius: 18px;
      font-size: 14.5px;
      font-weight: 700;
      cursor: pointer;
      color: white;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-maps { flex: 1; background: linear-gradient(135deg, #f43f5e, #fb923c); }
    .btn-ativo { flex: 1; background: linear-gradient(135deg, #64748b, #475569); }
    .btn-status-rota { background: linear-gradient(135deg, #eab308, #f59e0b); padding: 16px; }
    .btn-status-falha { background: linear-gradient(135deg, #ef4444, #b91c1c); padding: 14px; font-size: 13.5px; }

    .status-box {
      margin-top: 16px;
      padding: 14px;
      border-radius: 16px;
      text-align: center;
      font-weight: 700;
      font-size: 15px;
    }

    .rota {
      background: rgba(234, 179, 8, 0.15);
      color: #fde047;
      border: 1px solid rgba(234, 179, 8, 0.4);
    }

    .concluido {
      background: rgba(74, 222, 128, 0.15);
      color: #4ade80;
      border: 1px solid rgba(74, 222, 128, 0.4);
    }

    .nao-concluido {
      background: rgba(244, 63, 94, 0.15);
      color: #f87171;
      border: 1px solid rgba(244, 63, 94, 0.4);
    }

    .card-obs-preview {
      margin-top: 10px;
      font-size: 13.5px;
      color: #f87171;
      background: rgba(244, 63, 94, 0.08);
      padding: 8px 12px;
      border-radius: 10px;
      border-left: 3px solid #ef4444;
      font-style: italic;
    }

    /* Sistema Unificado de Overlays e Modais Inteligentes */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(2, 6, 23, 0);
      backdrop-filter: blur(0px);
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: background-color 0.3s ease, backdrop-filter 0.3s ease;
    }

    .modal-overlay.aberto {
      display: flex;
      background: rgba(2, 6, 23, 0.85);
      backdrop-filter: blur(10px);
    }

    .modal {
      background: #0f172a;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 32px;
      padding: 32px 28px;
      width: 100%;
      max-width: 480px;
      max-height: 92vh;
      overflow-y: auto;
      position: relative;
      box-shadow: 0 40px 80px rgba(0,0,0,0.6);
      opacity: 0;
      transform: scale(0.9) translateY(15px);
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.25s ease;
    }

    .modal-overlay.aberto .modal {
      opacity: 1;
      transform: scale(1) translateY(0);
    }

    .modal-titulo {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 24px;
      background: linear-gradient(90deg, #22d3ee, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .modal-fechar {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 34px;
      height: 34px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.07);
      color: #94a3b8;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .modal-fechar:hover {
      background: rgba(244, 63, 94, 0.2);
      color: #f87171;
      border-color: rgba(244,63,94,0.3);
    }

    .campo-grupo {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }

    .campo-label {
      font-size: 12px;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .campo-input {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 13px 16px;
      font-size: 15px;
      color: white;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    .campo-input:focus {
      border-color: rgba(34, 211, 238, 0.45);
      background: rgba(34, 211, 238, 0.05);
    }

    .campo-textarea-modal {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 13px 16px;
      font-size: 15px;
      color: white;
      outline: none;
      width: 100%;
      min-height: 90px;
      resize: vertical;
    }

    .campo-textarea-modal:focus {
      border-color: rgba(244, 63, 94, 0.45);
      background: rgba(244, 63, 94, 0.05);
    }

    .campo-select {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 13px 16px;
      font-size: 15px;
      color: white;
      outline: none;
      width: 100%;
      cursor: pointer;
      transition: border-color 0.2s;
      appearance: none;
    }

    .campo-select option {
      background: #0f172a;
      color: white;
    }

    .select-wrapper {
      position: relative;
    }

    .select-wrapper::after {
      content: '▾';
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #64748b;
      pointer-events: none;
      font-size: 14px;
    }

    .modal-divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.07);
      margin: 20px 0;
    }

    .modal-secao {
      font-size: 11px;
      font-weight: 700;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
    }

    .btn-salvar-modal {
      width: 100%;
      margin-top: 24px;
      border: none;
      padding: 17px;
      border-radius: 18px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #22d3ee, #3b82f6);
      box-shadow: 0 8px 20px rgba(34, 211, 238, 0.2);
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15, 23, 42, 0.96);
      border: 1px solid rgba(34, 211, 238, 0.2);
      backdrop-filter: blur(16px);
      padding: 16px 26px;
      border-radius: 20px;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: all 0.4s;
      z-index: 999;
      white-space: nowrap;
    }

    .toast.show { opacity: 1; }

    .loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(2, 6, 23, 0.75);
      backdrop-filter: blur(12px);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
    }

    .loading-overlay.ativo {
      display: flex;
    }

    .spinner-container {
      position: relative;
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .spinner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 4px solid rgba(255, 255, 255, 0.03);
      border-top-color: #22d3ee;
      border-right-color: #3b82f6;
      animation: rodar 1s cubic-bezier(0.55, 0.055, 0.675, 0.19) infinite;
    }

    .spinner-pulso {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(34, 211, 238, 0.15) 0%, transparent 70%);
      animation: pulsar 1.6s ease-in-out infinite;
    }

    .loading-texto {
      font-size: 16px;
      font-weight: 700;
      color: #e2e8f0;
    }

    @keyframes rodar {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes pulsar {
      0%, 100% { transform: scale(0.9); opacity: 0.4; }
      50% { transform: scale(1.3); opacity: 0.9; }
    }

    @media(max-width: 640px) {
      .card { min-width: 92vw; max-width: 92vw; }
      .modal { padding: 26px 20px; }
    }
  </style>
</head>

<body>

  <div class="topo">
    <h1>📡 Monitoramento Técnico em Tempo Real</h1>
    <p id="subtitulo">Clique no painel de um técnico para abrir a sua agenda completa</p>
    <button class="btn-config" onclick="abrirModalConfig()">⚙️ Gerenciar Técnicos</button>
  </div>

  <!-- NOVO MODAL DE GERENCIAMENTO DE TÉCNICOS -->
  <div class="modal-overlay" id="modalConfigOverlay">
    <div class="modal">
      <button class="modal-fechar" onclick="fecharModalConfig()">✕</button>
      <div class="modal-titulo">⚙️ Gerenciar Técnicos</div>
      
      <div class="modal-secao">Cadastrar Novo Técnico</div>
      <div class="form-add-tecnico">
        <input type="text" class="input-add" id="nomeNovoTecnico" placeholder="Nome do técnico..." />
        <button class="btn-add" onclick="adicionarTecnico()">➕ Adicionar</button>
      </div>
      
      <div class="modal-divider"></div>
      <div class="modal-secao">Técnicos Ativos no Sistema</div>
      <div class="lista-gerenciar" id="listaGerenciarTecnicos"></div>
    </div>
  </div>

  <div class="seletor-tecnico" id="seletorTecnico">
    <!-- Os cards de monitoramento são renderizados dinamicamente via JS -->
  </div>

  <div class="painel-tecnico oculto" id="painelTecnico">
    <button class="btn-trocar" onclick="trocarTecnico()">↩️ Voltar ao Painel Geral</button>

    <button class="btn-mostrar" id="btnMostrar" onclick="mostrarImportador()">
      📋 Mostrar campo da agenda
    </button>

    <div class="importador" id="importador">
      <textarea id="entrada" placeholder="Cole aqui a agenda completa..."></textarea>
      <button class="btn-gerar" onclick="gerarAgenda()">🚀 Gerar Agenda Inteligente</button>
    </div>

    <div class="cards" id="cards"></div>
  </div>

  <!-- MODAL DE EDIÇÃO DE ORDEM DE SERVIÇO -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <button class="modal-fechar" onclick="fecharModal()">✕</button>
      <div class="modal-titulo">✏️ Editar OS</div>

      <div class="modal-secao">Dados Principais</div>
      <div class="campo-grupo"><label class="campo-label">Horário</label><input class="campo-input" id="edit-horario" type="text" /></div>
      <div class="campo-grupo"><label class="campo-label">Cliente</label><input class="campo-input" id="edit-cliente" type="text" /></div>
      <div class="campo-grupo"><label class="campo-label">Assunto</label><input class="campo-input" id="edit-assunto" type="text" /></div>
      <div class="campo-grupo"><label class="campo-label">Endereço</label><input class="campo-input" id="edit-endereco" type="text" /></div>

      <hr class="modal-divider" />
      <div class="modal-secao">Credenciais</div>
      <div class="campo-grupo"><label class="campo-label">Login</label><input class="campo-input" id="edit-login" type="text" /></div>
      <div class="campo-grupo"><label class="campo-label">Senha PPPoE</label><input class="campo-input" id="edit-senha" type="text" /></div>

      <hr class="modal-divider" />
      <div class="modal-secao">Status da OS</div>
      <div class="campo-grupo">
        <div class="select-wrapper">
          <select class="campo-select" id="edit-status">
            <option value="">Aguardando status</option>
            <option value="rota">🚗 Em rota</option>
            <option value="concluido">✅ Concluído</option>
            <option value="nao-concluido">❌ Não concluído</option>
          </select>
        </div>
      </div>

      <div class="campo-grupo" id="campo-grupo-obs">
        <label class="campo-label" style="color: #f87171;">⚠️ Motivo / Observação</label>
        <textarea class="campo-textarea-modal" id="edit-observacao" placeholder="Caso não tenha sido concluída, digite o motivo aqui para salvar..."></textarea>
      </div>

      <button class="btn-salvar-modal" id="btnSalvarModal" onclick="salvarEdicaoOS()">💾 Salvar alterações</button>
    </div>
  </div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner-container"><div class="spinner-pulso"></div><div class="spinner"></div></div>
    <div class="loading-texto" id="loadingTexto">Sincronizando...</div>
  </div>

  <div class="toast" id="toast">✅ Copiado com sucesso</div>

  <script>
    const API_URL = "https://68f458d8b16eb6f46834542c.mockapi.io/Rexord/Galeria";

    let listaTecnicos = ['Andre', 'Guilherme'];
    let tecnicoAtual = null;
    let registroAtualId = null;
    let statusOS = {};
    let dadosOS = [];
    let osEditandoIndex = null;

    if(localStorage.getItem('lista_tecnicos_smart')) {
      try {
        listaTecnicos = JSON.parse(localStorage.getItem('lista_tecnicos_smart'));
      } catch(e){}
    }

    function toggleLoading(exibir, mensagem = "Sincronizando...") {
      const overlay = document.getElementById("loadingOverlay");
      document.getElementById("loadingTexto").textContent = mensagem;
      if (exibir) overlay.classList.add("ativo");
      else overlay.classList.remove("ativo");
    }

    /* Gerenciamento do Modal de Técnicos com Animação Fluida */
    function abrirModalConfig() {
      const overlay = document.getElementById("modalConfigOverlay");
      overlay.style.display = "flex";
      setTimeout(() => overlay.classList.add("aberto"), 10);
      renderizarListaGerenciar();
    }

    function fecharModalConfig() {
      const overlay = document.getElementById("modalConfigOverlay");
      overlay.classList.remove("aberto");
      setTimeout(() => overlay.style.display = "none", 300);
    }

    document.getElementById("modalConfigOverlay").addEventListener("click", function(e) {
      if (e.target === this) fecharModalConfig();
    });

    function toggleDropdown(tec, event) {
      if (event) event.stopPropagation();
      
      const container = document.getElementById(`atividades-${tec}`);
      const btn = document.getElementById(`btn-drop-${tec}`);
      
      if (container.classList.contains('visivel')) {
        container.classList.remove('visivel');
        setTimeout(() => container.style.display = 'none', 250);
        btn.innerHTML = 'Expandir 🔽';
      } else {
        container.style.display = 'flex';
        setTimeout(() => container.classList.add('visivel'), 10);
        btn.innerHTML = 'Recolher 🔼';
      }
    }

    function renderizarListaGerenciar() {
      const container = document.getElementById("listaGerenciarTecnicos");
      container.innerHTML = "";
      listaTecnicos.forEach(tec => {
        container.innerHTML += `
          <div class="item-gerenciar">
            <span>👤 ${tec}</span>
            <button class="btn-deletar-tec" onclick="removerTecnico('${tec}')">Excluir</button>
          </div>
        `;
      });
    }

    function adicionarTecnico() {
      const input = document.getElementById("nomeNovoTecnico");
      const nome = input.value.trim().replace(/[^a-zA-Z0-9 ]/g, "");
      if(!nome) return;

      if(listaTecnicos.includes(nome)) {
        alert("Este técnico já existe!");
        return;
      }

      listaTecnicos.push(nome);
      localStorage.setItem('lista_tecnicos_smart', JSON.stringify(listaTecnicos));
      input.value = "";
      renderizarListaGerenciar();
      renderizarCardsMonitoramento();
      carregarDashboardGeral();
      mostrarToast("👤 Técnico adicionado!");
    }

    async function removerTecnico(nome) {
      const senha = prompt(`Digite a senha mestre para excluir o técnico ${nome}:`);
      if (senha !== "mikeadmin") {
        alert("Senha incorreta! Operação cancelada.");
        return;
      }

      fecharModalConfig();
      toggleLoading(true, `Excluindo ${nome} do servidor...`);
      try {
        const resp = await fetch(`${API_URL}?tecnico=${encodeURIComponent(nome)}`);
        if(resp.ok) {
          const dados = await resp.json();
          if(dados && dados.length > 0) {
            await fetch(`${API_URL}/${dados[0].id}`, { method: "DELETE" });
          }
        }
      } catch(e) {
        console.warn("Erro ao deletar do servidor, limpando apenas localmente.", e);
      }

      listaTecnicos = listaTecnicos.filter(t => t !== nome);
      localStorage.setItem('lista_tecnicos_smart', JSON.stringify(listaTecnicos));
      
      for (let i = localStorage.length - 1; i >= 0; i--) {
        const key = localStorage.key(i);
        if(key && (key.includes(`_${nome}_`))) {
          localStorage.removeItem(key);
        }
      }

      renderizarCardsMonitoramento();
      await carregarDashboardGeral();
      toggleLoading(false);
      abrirModalConfig(); // reabre o modal de config atualizado
      mostrarToast("❌ Técnico removido!");
    }

    function renderizarCardsMonitoramento() {
      const container = document.getElementById("seletorTecnico");
      container.innerHTML = "";
      listaTecnicos.forEach(tec => {
        container.innerHTML += `
          <div class="card-monitor" id="card-monitor-${tec}">
            <div class="monitor-header">
              <div class="monitor-info-esquerda" onclick="selecionarTecnico('${tec}')">
                <div class="monitor-nome">👤 ${tec}</div>
                <div class="status-preview" id="preview-${tec}"></div>
              </div>
              <button class="btn-dropdown" id="btn-drop-${tec}" onclick="toggleDropdown('${tec}', event)">Expandir 🔽</button>
            </div>
            <div class="monitor-atividades" id="atividades-${tec}">
               <div class="sem-atividade">Nenhuma rota ativa no momento.</div>
            </div>
          </div>
        `;
      });
    }

    async function carregarDashboardGeral() {
      for(const tec of listaTecnicos) {
        try {
          const resp = await fetch(`${API_URL}?tecnico=${encodeURIComponent(tec)}`);
          if (!resp.ok) throw new Error();
          const dados = await resp.json();
          
          let emRota = 0, concluidas = 0, naoConcluidas = 0, aguardando = 0;
          let logsHtml = "";

          if (dados && dados.length > 0 && dados[0].agenda) {
            const registro = dados[0];
            const listaOS = parsearAgenda(registro.agenda);
            
            let statusSalvo = {};
            if (registro.status) {
              try { statusSalvo = JSON.parse(registro.status); } catch(e){}
            }

            Object.keys(statusSalvo).forEach(osId => {
              if (typeof statusSalvo[osId] === 'object') {
                localStorage.setItem(`status_${tec}_${osId}`, statusSalvo[osId].status || "");
                localStorage.setItem(`obs_${tec}_${osId}`, statusSalvo[osId].obs || "");
                localStorage.setItem(`timestamp_${tec}_${osId}_${statusSalvo[osId].status}`, statusSalvo[osId].timestamp || "--:--");
              } else {
                localStorage.setItem(`status_${tec}_${osId}`, statusSalvo[osId]);
              }
            });

            listaOS.forEach(itemOS => {
              const statusAtual = localStorage.getItem(`status_${tec}_${itemOS.id}`);
              const obsSalva = localStorage.getItem(`obs_${tec}_${itemOS.id}`) || "";

              if (statusAtual === 'rota') {
                const horaLog = localStorage.getItem(`timestamp_${tec}_${itemOS.id}_rota`) || '--:--';
                emRota++;
                logsHtml += `
                  <div class="log-atividade">
                    <span class="log-badge rota">Em rota</span>
                    <div class="log-info">
                      <strong>${escapeHtml(itemOS.cliente)}</strong>
                      <span class="tipo-servico">📋 ${escapeHtml(itemOS.assunto)}</span>
                    </div>
                    <div class="log-hora">⏰ ${horaLog}</div>
                  </div>
                `;
              } else if (statusAtual === 'concluido') {
                const horaLog = localStorage.getItem(`timestamp_${tec}_${itemOS.id}_concluido`) || '--:--';
                concluidas++;
                logsHtml += `
                  <div class="log-atividade">
                    <span class="log-badge concluido">Concluído</span>
                    <div class="log-info">
                      <strong>${escapeHtml(itemOS.cliente)}</strong>
                      <span class="tipo-servico">📋 ${escapeHtml(itemOS.assunto)}</span>
                    </div>
                    <div class="log-hora">⏰ ${horaLog}</div>
                  </div>
                `;
              } else if (statusAtual === 'nao-concluido') {
                const horaLog = localStorage.getItem(`timestamp_${tec}_${itemOS.id}_nao-concluido`) || '--:--';
                naoConcluidas++;
                logsHtml += `
                  <div class="log-atividade">
                    <span class="log-badge nao-concluido">Não Concluido</span>
                    <div class="log-info">
                      <strong>${escapeHtml(itemOS.cliente)}</strong>
                      <span class="tipo-servico">📋 ${escapeHtml(itemOS.assunto)}</span>
                      ${obsSalva ? `<span class="obs-texto">⚠️ Motivo: ${escapeHtml(obsSalva)}</span>` : ''}
                    </div>
                    <div class="log-hora">⏰ ${horaLog}</div>
                  </div>
                `;
              } else {
                aguardando++;
                logsHtml += `
                  <div class="log-atividade">
                    <span class="log-badge aguardando">Aguardando</span>
                    <div class="log-info">
                      <strong>${escapeHtml(itemOS.cliente)}</strong>
                      <span class="tipo-servico">📋 ${escapeHtml(itemOS.assunto)}</span>
                    </div>
                    <div class="log-hora">⏳ --:--</div>
                  </div>
                `;
              }
            });
          }

          const preview = document.getElementById(`preview-${tec}`);
          if(preview) {
            let htmlContador = '';
            if (emRota > 0) htmlContador += `<span class="preview-rota">🚗 ${emRota}</span>`;
            if (concluidas > 0) htmlContador += `<span class="preview-concluido">✅ ${concluidas}</span>`;
            if (naoConcluidas > 0) htmlContador += `<span class="preview-nao-concluido">❌ ${naoConcluidas}</span>`;
            if (aguardando > 0) htmlContador += `<span class="preview-aguardando">⏳ ${aguardando}</span>`;
            preview.innerHTML = htmlContador || '<span style="color:#64748b">Sem atividades</span>';
          }

          const containerAtividades = document.getElementById(`atividades-${tec}`);
          if(containerAtividades) {
            containerAtividades.innerHTML = logsHtml || `<div class="sem-atividade">Nenhuma O.S. configurada no sistema.</div>`;
          }

        } catch(e) {
          console.warn("Sem dados ou erro para " + tec, e);
        }
      }
    }

    async function selecionarTecnico(nome) {
      tecnicoAtual = nome;
      document.getElementById("subtitulo").textContent = `Agenda completa do Técnico: ${nome}`;
      document.getElementById("seletorTecnico").classList.add("oculto");
      document.getElementById("painelTecnico").classList.remove("oculto");
      
      document.getElementById("cards").innerHTML = "";
      document.getElementById("entrada").value = "";

      toggleLoading(true, "Buscando agenda no servidor...");
      try {
        const resp = await fetch(`${API_URL}?tecnico=${encodeURIComponent(tecnicoAtual)}`);
        if(!resp.ok) throw new Error();
        const dados = await resp.json();
        
        if (dados && dados.length > 0) {
          const registro = dados[0];
          registroAtualId = registro.id;
          document.getElementById("entrada").value = registro.agenda || "";
          
          if (registro.status) {
            try {
              const statusSalvo = JSON.parse(registro.status);
              Object.keys(statusSalvo).forEach(osId => {
                if (typeof statusSalvo[osId] === 'object') {
                  localStorage.setItem(`status_${tecnicoAtual}_${osId}`, statusSalvo[osId].status || "");
                  localStorage.setItem(`obs_${tecnicoAtual}_${osId}`, statusSalvo[osId].obs || "");
                  localStorage.setItem(`timestamp_${tecnicoAtual}_${osId}_${statusSalvo[osId].status}`, statusSalvo[osId].timestamp || "--:--");
                } else {
                  localStorage.setItem(`status_${tecnicoAtual}_${osId}`, statusSalvo[osId]);
                }
              });
            } catch(e) {}
          }

          if (registro.agenda) {
            criarCards(registro.agenda);
            document.getElementById("importador").classList.add("oculto");
            document.getElementById("btnMostrar").style.display = "block";
          } else {
            abrirModoVazio();
          }
        } else {
          abrirModoVazio();
        }
      } catch (e) {
        abrirModoVazio();
      } finally {
        toggleLoading(false);
      }
    }

    function abrirModoVazio() {
      registroAtualId = null;
      document.getElementById("importador").classList.remove("oculto");
      document.getElementById("btnMostrar").style.display = "none";
      document.getElementById("cards").innerHTML = `<div class="sem-atividade" style="width:100%">Nenhuma O.S. configurada para este técnico. Cole a agenda acima.</div>`;
    }

    function trocarTecnico() {
      tecnicoAtual = null;
      registroAtualId = null;
      statusOS = {};
      dadosOS = [];
      document.getElementById("subtitulo").textContent = "Clique no painel de um técnico para abrir a sua agenda completa";
      document.getElementById("seletorTecnico").classList.remove("oculto");
      document.getElementById("painelTecnico").classList.add("oculto");
      carregarDashboardGeral();
    }

    async function salvarAgendaNaApi(texto, mensagemSilenciosa = false) {
      if(!mensagemSilenciosa) toggleLoading(true, "Salvando alterações...");
      
      const statusParaSalvar = {};
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.startsWith(`status_${tecnicoAtual}_`)) {
          const osId = key.replace(`status_${tecnicoAtual}_`, "");
          const statusVal = localStorage.getItem(key);
          const obsVal = localStorage.getItem(`obs_${tecnicoAtual}_${osId}`) || "";
          const timeVal = localStorage.getItem(`timestamp_${tecnicoAtual}_${osId}_${statusVal}`) || "--:--";

          statusParaSalvar[osId] = {
            status: statusVal,
            obs: obsVal,
            timestamp: timeVal
          };
        }
      }

      try {
        const payload = {
          tecnico: tecnicoAtual,
          agenda: texto,
          status: JSON.stringify(statusParaSalvar)
        };

        if (registroAtualId) {
          await fetch(`${API_URL}/${registroAtualId}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
        } else {
          const resp = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
          const criado = await resp.json();
          registroAtualId = criado.id;
        }
      } catch (e) {
        mostrarToast("❌ Erro ao salvar dados na nuvem.");
      } finally {
        if(!mensagemSilenciosa) toggleLoading(false);
      }
    }

    function gerarAgenda() {
      const texto = document.getElementById("entrada").value.trim();
      if (!texto) return;

      criarCards(texto);
      salvarAgendaNaApi(texto);
      document.getElementById("importador").classList.add("oculto");
      document.getElementById("btnMostrar").style.display = "block";
    }

    function parsearAgenda(texto) {
      const blocks = texto.split(/ID:\s*/i).slice(1);
      return blocks.map(bloco => ({
        id:        bloco.match(/^(\d+)/)?.[1]?.trim()                          || "Sem ID",
        cliente:   bloco.match(/Cliente:\s*(.*)/i)?.[1]?.trim()                || "Cliente não informado",
        horario:   bloco.match(/Horário:\s*(.*)/i)?.[1]?.trim()                || "",
        endereco:  bloco.match(/Endereço:\s*(.*)/i)?.[1]?.trim()               || "",
        login:     bloco.match(/Login:\s*(.*)/i)?.[1]?.trim()                  || "",
        senha:     bloco.match(/Senha\s*(?:do\s*)?PP+o?E:\s*(.*)/i)?.[1]?.trim() || "",
        assunto:   bloco.match(/Assunto:\s*(.*)/i)?.[1]?.trim()                || "Sem assunto",
        raw:       bloco
      }));
    }

    function serializarAgenda(lista) {
      return lista.map(os => (
        `ID: ${os.id}\n` +
        `Horário: ${os.horario}\n` +
        `Cliente: ${os.cliente}\n` +
        `Assunto: ${os.assunto}\n` +
        `Endereço: ${os.endereco}\n` +
        `Login: ${os.login}\n` +
        `Senha PPPoE: ${os.senha}`
      )).join("\n\n");
    }

    function escapeHtml(str) {
      if(!str) return "";
      return str.replace(/&/g, "&").replace(/</g, "<").replace(/>/g, ">");
    }

    function criarCards(texto) {
      dadosOS = parsearAgenda(texto);
      const cardsContainer = document.getElementById("cards");
      cardsContainer.innerHTML = "";

      if(dadosOS.length === 0) {
        cardsContainer.innerHTML = `<div class="sem-atividade" style="width:100%">Nenhuma O.S. válida encontrada no texto.</div>`;
        return;
      }

      dadosOS.forEach((os, idx) => {
        const enderecoLimpo = (os.endereco || "").replace(/\?/g, "").replace(/\s+/g, " ").trim();
        const maps = `https://maps.google.com/?q=${encodeURIComponent(enderecoLimpo)}`;
        const loginSeguro = escapeHtml(os.login);
        const senhaSegura = escapeHtml(os.senha);
        const obsSalva = localStorage.getItem(`obs_${tecnicoAtual}_${os.id}`) || "";

        cardsContainer.innerHTML += `
          <div class="card" data-idx="${idx}" data-id="${os.id}" data-cliente="${escapeHtml(os.cliente)}" data-maps="${escapeHtml(maps)}" data-endereco="${escapeHtml(enderecoLimpo)}">
            <button class="btn-editar-os" onclick="abrirModal(${idx})">✏️</button>
            <div class="horario">🕒 ${os.horario}</div>
            <div class="cliente">${escapeHtml(os.cliente)}</div>
            <div class="info"><strong>🔹 O.S:</strong> <span class="os-number">${os.id}</span></div>
            <div class="assunto">📋 ${escapeHtml(os.assunto)}</div>
            <div class="info"><strong>📍 Endereço:</strong><br>${escapeHtml(enderecoLimpo)}</div>

            <div class="info-linha">
              <div class="info"><strong>🔐 Login:</strong> ${loginSeguro || " "}</div>
              <button class="btn-copiar" data-copiar="${loginSeguro}" title="Copiar login">📋</button>
            </div>
            <div class="info-linha">
              <div class="info"><strong>🔑 Senha PPPoE:</strong> ${senhaSegura || " "}</div>
              <button class="btn-copiar" data-copiar="${senhaSegura}" title="Copiar senha">📋</button>
            </div>

            <div class="botoes-grupo">
              <div class="btn-links">
                <button class="btn-maps">🗺️ Maps</button>
                <button class="btn-ativo">🌐 Ativo</button>
                <button class="btn-status-falha" onclick="forcarNaoExecutada(${idx})">❌ Não Executada</button>
              </div>
              <button class="btn-status-rota">🚗 Iniciar Rota</button>
            </div>
            <div class="status-box vazio">Aguardando status</div>
            ${obsSalva ? `<div class="card-obs-preview" id="obs-preview-${os.id}">⚠️ Observação: ${escapeHtml(obsSalva)}</div>` : ''}
          </div>
        `;
      });

      iniciarEventos();
    }

    function obtenerHoraAtual() {
      const agora = new Date();
      return agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    }

    function iniciarEventos() {
      statusOS = {};

      document.querySelectorAll(".card").forEach(card => {
        const os      = card.dataset.id;
        const cliente = card.dataset.cliente;
        const endereco = card.dataset.endereco;
        const box     = card.querySelector(".status-box");
        const btnRota = card.querySelector(".btn-status-rota");

        card.querySelector(".btn-maps").addEventListener("click", () => window.open(card.dataset.maps, "_blank"));
        card.querySelector(".btn-ativo").addEventListener("click", () => window.open("https://sistema.ativotelecom.com.br/central_assinante_web/login", "_blank"));

        card.querySelectorAll(".btn-copiar").forEach(btn => {
          btn.addEventListener("click", () => {
            const valor = btn.dataset.copiar || "";
            if (!valor) return;
            navigator.clipboard.writeText(valor).then(() => {
              mostrarToast("✅ Copiado com sucesso");

              if (btn.getAttribute("title").includes("senha")) {
                statusOS[os] = "concluido";
                localStorage.setItem(`status_${tecnicoAtual}_${os}`, "concluido");
                localStorage.setItem(`timestamp_${tecnicoAtual}_${os}_concluido`, obtenerHoraAtual());
                aplicarStatus(box, btnRota, "concluido");
                salvarAgendaNaApi(document.getElementById("entrada").value, true);
              }
            });
          });
        });

        btnRota.addEventListener("click", () => {
          statusOS[os] = "rota";
          localStorage.setItem(`status_${tecnicoAtual}_${os}`, "rota");
          localStorage.setItem(`timestamp_${tecnicoAtual}_${os}_rota`, obtenerHoraAtual());
          aplicarStatus(box, btnRota, "rota");
          salvarAgendaNaApi(document.getElementById("entrada").value, true);

          const script = `🚗 EM ROTA\n\n👤 Cliente: ${cliente}\n📍 Endereço: ${endereco}`;
          navigator.clipboard.writeText(script).then(() => {
            mostrarToast("✅ Texto copiado!");
            window.open("https://t.me/c/1989058391/167773", "_blank");
          });
        });

        const statusSalvo = localStorage.getItem(`status_${tecnicoAtual}_${os}`);
        if (statusSalvo) {
          statusOS[os] = statusSalvo;
          aplicarStatus(box, btnRota, statusSalvo);
        }
      });
    }

    function aplicarStatus(box, btnRota, status) {
      if (status === "rota") {
        box.className = "status-box rota";
        box.innerHTML = "🚗 Em rota";
        btnRota.style.opacity = "0.6";
        btnRota.style.pointerEvents = "none";
      } else if (status === "concluido") {
        box.className = "status-box concluido";
        box.innerHTML = "✅ Concluído";
        btnRota.style.opacity = "1";
        btnRota.style.pointerEvents = "auto";
      } else if (status === "nao-concluido") {
        box.className = "status-box nao-concluido";
        box.innerHTML = "❌ Não concluído";
        btnRota.style.opacity = "1";
        btnRota.style.pointerEvents = "auto";
      }
    }

    function forcarNaoExecutada(idx) {
      abrirModal(idx);
      document.getElementById("edit-status").value = "nao-concluido";
      setTimeout(() => {
        document.getElementById("edit-observacao").focus();
      }, 150);
    }

    /* Modal de Edição de OS com Animação Fluida */
    function abrirModal(idx) {
      osEditandoIndex = idx;
      const os = dadosOS[idx];

      document.getElementById("edit-horario").value  = os.horario  || "";
      document.getElementById("edit-cliente").value  = os.cliente  || "";
      document.getElementById("edit-assunto").value  = os.assunto  || "";
      document.getElementById("edit-endereco").value = os.endereco || "";
      document.getElementById("edit-login").value    = os.login     || "";
      document.getElementById("edit-senha").value    = os.senha     || "";
      
      document.getElementById("edit-observacao").value = localStorage.getItem(`obs_${tecnicoAtual}_${os.id}`) || "";
      document.getElementById("edit-status").value = localStorage.getItem(`status_${tecnicoAtual}_${os.id}`) || "";
      
      const overlay = document.getElementById("modalOverlay");
      overlay.style.display = "flex";
      setTimeout(() => overlay.classList.add("aberto"), 10);
    }

    function fecharModal() {
      const overlay = document.getElementById("modalOverlay");
      overlay.classList.remove("aberto");
      setTimeout(() => {
        overlay.style.display = "none";
        osEditandoIndex = null;
      }, 300);
    }

    document.getElementById("modalOverlay").addEventListener("click", function(e) {
      if (e.target === this) fecharModal();
    });

    async function salvarEdicaoOS() {
      if (osEditandoIndex === null) return;

      const os = dadosOS[osEditandoIndex];
      os.horario  = document.getElementById("edit-horario").value.trim();
      os.cliente  = document.getElementById("edit-cliente").value.trim();
      os.assunto  = document.getElementById("edit-assunto").value.trim();
      os.endereco = document.getElementById("edit-endereco").value.trim();
      os.login    = document.getElementById("edit-login").value.trim();
      os.senha    = document.getElementById("edit-senha").value.trim();

      const novaObs = document.getElementById("edit-observacao").value.trim();
      if(novaObs) {
        localStorage.setItem(`obs_${tecnicoAtual}_${os.id}`, novaObs);
      } else {
        localStorage.removeItem(`obs_${tecnicoAtual}_${os.id}`);
      }

      const novoStatus = document.getElementById("edit-status").value;
      if (novoStatus) {
        localStorage.setItem(`status_${tecnicoAtual}_${os.id}`, novoStatus);
        localStorage.setItem(`timestamp_${tecnicoAtual}_${os.id}_${novoStatus}`, obterHoraAtual());
      } else {
        localStorage.removeItem(`status_${tecnicoAtual}_${os.id}`);
      }

      const novoTexto = serializarAgenda(dadosOS);
      document.getElementById("entrada").value = novoTexto;
      
      fecharModal();
      await salvarAgendaNaApi(novoTexto);
      criarCards(novoTexto);
      mostrarToast("💾 OS Atualizada e Sincronizada!");
    }

    function mostrarToast(msg) {
      const toast = document.getElementById("toast");
      toast.textContent = msg;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2600);
    }

    function mostrarImportador() {
      document.getElementById("importador").classList.remove("oculto");
      document.getElementById("btnMostrar").style.display = "none";
    }

    window.onload = function() {
      renderizarCardsMonitoramento();
      carregarDashboardGeral();
    };
  </script>
</body>
</html>
