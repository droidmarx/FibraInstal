<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda Técnica Inteligente</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #0f172a 0%, #020617 75%);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
      padding: 20px;
    }

    .topo {
      margin-bottom: 32px;
      text-align: center;
    }

    .topo h1 {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(90deg, #22d3ee, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .topo p {
      color: #94a3b8;
      font-size: 15.5px;
    }

    .seletor-tecnico {
      display: flex;
      gap: 16px;
      max-width: 480px;
      margin: 0 auto 32px;
    }

    .seletor-tecnico.oculto {
      display: none;
    }

    .btn-tecnico {
      flex: 1;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px);
      color: white;
      padding: 22px;
      border-radius: 22px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-tecnico:hover {
      transform: translateY(-3px);
      background: linear-gradient(135deg, #22d3ee, #3b82f6);
      border-color: transparent;
    }

    .painel-tecnico.oculto {
      display: none;
    }

    .btn-trocar {
      display: block;
      margin: 0 auto 20px;
      border: none;
      background: none;
      color: #67e8f9;
      font-size: 14.5px;
      font-weight: 700;
      cursor: pointer;
      padding: 6px 10px;
    }

    .btn-trocar:hover {
      text-decoration: underline;
    }

    .carregando {
      text-align: center;
      color: #94a3b8;
      font-size: 15px;
      padding: 20px;
    }

    .carregando.oculto {
      display: none;
    }

    .importador {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      border-radius: 28px;
      padding: 28px;
      margin-bottom: 32px;
    }

    .importador.oculto {
      opacity: 0;
      transform: translateY(-20px);
      pointer-events: none;
      height: 0;
      overflow: hidden;
      padding: 0;
      margin: 0;
    }

    textarea {
      width: 100%;
      min-height: 260px;
      resize: vertical;
      border: none;
      outline: none;
      border-radius: 24px;
      padding: 22px;
      font-size: 15.5px;
      background: rgba(255, 255, 255, 0.07);
      color: white;
      line-height: 1.65;
    }

    .btn-gerar {
      width: 100%;
      margin-top: 20px;
      border: none;
      padding: 18px;
      border-radius: 20px;
      font-size: 16.5px;
      font-weight: 700;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #22d3ee, #3b82f6);
      box-shadow: 0 10px 20px rgba(34, 211, 238, 0.2);
    }

    .btn-gerar:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 25px rgba(34, 211, 238, 0.3);
    }

    .btn-mostrar {
      display: none;
      width: 100%;
      margin-bottom: 20px;
      border: none;
      padding: 16px;
      border-radius: 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      color: white;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .cards {
      display: flex;
      gap: 24px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      padding-bottom: 20px;
    }

    .card {
      min-width: 360px;
      max-width: 360px;
      flex-shrink: 0;
      scroll-snap-align: center;
      border-radius: 32px;
      padding: 26px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      transition: all 0.4s ease;
    }

    .card:hover {
      transform: translateY(-8px);
    }

    .horario {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 999px;
      background: linear-gradient(90deg, #22d3ee, #3b82f6);
      font-size: 14.5px;
      font-weight: 700;
      margin-bottom: 18px;
    }

    .cliente {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 16px;
    }

    .info {
      color: #cbd5e1;
      line-height: 1.65;
      margin: 10px 0;
      font-size: 15px;
    }

    .info strong {
      color: #e0f2fe;
    }

    .info-linha {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 10px 0;
    }

    .info-linha .info {
      margin: 0;
      flex: 1;
      min-width: 0;
      word-break: break-word;
    }

    .btn-copiar {
      flex-shrink: 0;
      border: none;
      width: 34px;
      height: 34px;
      border-radius: 10px;
      cursor: pointer;
      color: #67e8f9;
      background: rgba(103, 232, 249, 0.12);
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s;
    }

    .btn-copiar:hover {
      background: rgba(103, 232, 249, 0.22);
      transform: translateY(-1px);
    }

    .btn-copiar.copiado {
      background: rgba(74, 222, 128, 0.18);
      color: #4ade80;
    }

    .os-number {
      font-size: 17px;
      font-weight: 800;
      color: #67e8f9;
      background: rgba(103, 232, 249, 0.12);
      padding: 4px 12px;
      border-radius: 8px;
      display: inline-block;
    }

    .assunto {
      font-size: 14.5px;
      color: #a5b4fc;
      background: rgba(165, 180, 252, 0.1);
      padding: 6px 12px;
      border-radius: 8px;
      margin: 8px 0;
    }

    .botoes-grupo {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn-links {
      display: flex;
      gap: 12px;
    }

    .btn-maps, .btn-ativo, .btn-status-rota {
      border: none;
      padding: 15px;
      border-radius: 18px;
      font-size: 14.5px;
      font-weight: 700;
      cursor: pointer;
      color: white;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-maps { flex: 1; background: linear-gradient(135deg, #f43f5e, #fb923c); }
    .btn-ativo { flex: 1; background: linear-gradient(135deg, #64748b, #475569); }
    .btn-status-rota { background: linear-gradient(135deg, #eab308, #f59e0b); padding: 16px; }

    .btn-maps:hover, .btn-ativo:hover, .btn-status-rota:hover {
      transform: translateY(-2px);
    }

    .status-box {
      margin-top: 16px;
      padding: 14px;
      border-radius: 16px;
      text-align: center;
      font-weight: 700;
      font-size: 15px;
    }

    .rota {
      background: rgba(234, 179, 8, 0.15);
      color: #fde047;
      border: 1px solid rgba(234, 179, 8, 0.4);
    }

    .vazio {
      background: rgba(255, 255, 255, 0.04);
      color: #64748b;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15, 23, 42, 0.96);
      border: 1px solid rgba(34, 211, 238, 0.2);
      backdrop-filter: blur(16px);
      padding: 16px 26px;
      border-radius: 20px;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: all 0.4s;
      z-index: 999;
    }

    .toast.show { opacity: 1; }

    @media(max-width: 640px) {
      .card { min-width: 92vw; max-width: 92vw; }
    }
  </style>
</head>

<body>

  <div class="topo">
    <h1>📡 Agenda Técnica Inteligente</h1>
    <p id="subtitulo">Selecione o técnico para começar</p>
  </div>

  <div class="seletor-tecnico" id="seletorTecnico">
    <button class="btn-tecnico" data-tecnico="Andre" onclick="selecionarTecnico('Andre')">
      👤 Andre
    </button>
    <button class="btn-tecnico" data-tecnico="Guilherme" onclick="selecionarTecnico('Guilherme')">
      👤 Guilherme
    </button>
  </div>

  <div class="painel-tecnico oculto" id="painelTecnico">
    <button class="btn-trocar" onclick="trocarTecnico()">↩️ Trocar técnico</button>

    <button class="btn-mostrar" id="btnMostrar" onclick="mostrarImportador()">
      📋 Mostrar campo da agenda
    </button>

    <div class="importador" id="importador">
      <textarea id="entrada" placeholder="Cole aqui a agenda completa..."></textarea>
      <button class="btn-gerar" onclick="gerarAgenda()">🚀 Gerar Agenda Inteligente</button>
    </div>

    <div class="carregando oculto" id="carregando">⏳ Carregando agenda salva...</div>

    <div class="cards" id="cards"></div>
  </div>

  <div class="toast" id="toast">✅ Copiado com sucesso</div>

  <script>
    const API_URL = "https://68f458d8b16eb6f46834542c.mockapi.io/Rexord/Galeria";

    let tecnicoAtual = null;
    let registroAtualId = null; // id do registro na Mock API (null = ainda não existe)

    function selecionarTecnico(nome) {
      tecnicoAtual = nome;
      document.getElementById("subtitulo").textContent = `Agenda de ${nome} · cole a agenda do WhatsApp`;
      document.getElementById("seletorTecnico").classList.add("oculto");
      document.getElementById("painelTecnico").classList.remove("oculto");
      carregarAgendaDaApi();
    }

    function trocarTecnico() {
      tecnicoAtual = null;
      registroAtualId = null;
      document.getElementById("subtitulo").textContent = "Selecione o técnico para começar";
      document.getElementById("seletorTecnico").classList.remove("oculto");
      document.getElementById("painelTecnico").classList.add("oculto");
      document.getElementById("cards").innerHTML = "";
      document.getElementById("entrada").value = "";
      document.getElementById("importador").classList.remove("oculto");
      document.getElementById("btnMostrar").style.display = "none";
    }

    async function carregarAgendaDaApi() {
      const carregando = document.getElementById("carregando");
      carregando.classList.remove("oculto");
      document.getElementById("importador").classList.add("oculto");
      document.getElementById("btnMostrar").style.display = "none";

      try {
        const resp = await fetch(`${API_URL}?tecnico=${encodeURIComponent(tecnicoAtual)}`);
        const dados = await resp.json();

        if (dados && dados.length > 0) {
          const registro = dados[0];
          registroAtualId = registro.id;
          document.getElementById("entrada").value = registro.agenda || "";
          if (registro.agenda) {
            criarCards(registro.agenda);
            document.getElementById("importador").classList.add("oculto");
            document.getElementById("btnMostrar").style.display = "block";
          } else {
            document.getElementById("importador").classList.remove("oculto");
          }
        } else {
          registroAtualId = null;
          document.getElementById("importador").classList.remove("oculto");
        }
      } catch (e) {
        mostrarToast("⚠️ Não foi possível carregar a agenda salva");
        document.getElementById("importador").classList.remove("oculto");
      } finally {
        carregando.classList.add("oculto");
      }
    }

    async function salvarAgendaNaApi(texto) {
      try {
        if (registroAtualId) {
          await fetch(`${API_URL}/${registroAtualId}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ tecnico: tecnicoAtual, agenda: texto })
          });
        } else {
          const resp = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ tecnico: tecnicoAtual, agenda: texto })
          });
          const criado = await resp.json();
          registroAtualId = criado.id;
        }
      } catch (e) {
        mostrarToast("⚠️ Agenda gerada, mas houve erro ao salvar na nuvem");
      }
    }

    function gerarAgenda() {
      const texto = document.getElementById("entrada").value.trim();
      if (!texto) return;

      criarCards(texto);
      salvarAgendaNaApi(texto);
      document.getElementById("importador").classList.add("oculto");
      document.getElementById("btnMostrar").style.display = "block";
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function criarCards(texto) {
      const cardsContainer = document.getElementById("cards");
      cardsContainer.innerHTML = "";

      // Melhor parser: divide por ID: e limpa blocos
      const blocos = texto.split(/ID:\s*/i).slice(1);

      blocos.forEach(bloco => {
        const id = bloco.match(/^(\d+)/)?.[1] || "Sem ID";

        const cliente = bloco.match(/Cliente:\s*(.*)/i)?.[1]?.trim() || "Cliente não informado";
        const horario = bloco.match(/Horário:\s*(.*)/i)?.[1]?.trim() || "";
        const endereco = bloco.match(/Endereço:\s*(.*)/i)?.[1]?.trim() || "";
        const login = bloco.match(/Login:\s*(.*)/i)?.[1]?.trim() || "";
        const senhaPppoe = bloco.match(/Senha\s*(?:do\s*)?PP+o?E:\s*(.*)/i)?.[1]?.trim() || "";
        const assunto = bloco.match(/Assunto:\s*(.*)/i)?.[1]?.trim() || "Sem assunto";

        const enderecoLimpo = endereco.replace(/\?/g, "").replace(/\s+/g, " ").trim();
        const maps = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(enderecoLimpo)}`;

        const loginSeguro = escapeHtml(login);
        const senhaSegura = escapeHtml(senhaPppoe);

        cardsContainer.innerHTML += `
          <div class="card" data-id="${id}" data-cliente="${cliente}" data-maps="${maps}" data-endereco="${enderecoLimpo}">
            <div class="horario">🕒 ${horario}</div>
            <div class="cliente">${cliente}</div>
            
            <div class="info">
              <strong>🔹 O.S:</strong> 
              <span class="os-number">${id}</span>
            </div>

            <div class="assunto">📋 ${assunto}</div>
            
            <div class="info"><strong>📍 Endereço:</strong><br>${enderecoLimpo}</div>

            <div class="info-linha">
              <div class="info"><strong>🔐 Login:</strong> ${loginSeguro || "&nbsp;"}</div>
              <button class="btn-copiar" type="button" data-copiar="${loginSeguro}" title="Copiar login">📋</button>
            </div>

            <div class="info-linha">
              <div class="info"><strong>🔑 Senha PPPoE:</strong> ${senhaSegura || "&nbsp;"}</div>
              <button class="btn-copiar" type="button" data-copiar="${senhaSegura}" title="Copiar senha PPPoE">📋</button>
            </div>

            <div class="botoes-grupo">
              <div class="btn-links">
                <button class="btn-maps">🗺️ Maps</button>
                <button class="btn-ativo">🌐 Ativo</button>
              </div>
              <button class="btn-status-rota">🚗 Iniciar Rota</button>
            </div>

            <div class="status-box vazio">Aguardando status</div>
          </div>
        `;
      });

      iniciarEventos();
    }

    function iniciarEventos() {
      document.querySelectorAll(".card").forEach(card => {
        const os = card.dataset.id;
        const cliente = card.dataset.cliente;
        const endereco = card.dataset.endereco;

        const box = card.querySelector(".status-box");
        const btnMaps = card.querySelector(".btn-maps");
        const btnAtivo = card.querySelector(".btn-ativo");
        const btnRota = card.querySelector(".btn-status-rota");

        btnMaps.addEventListener("click", () => window.open(card.dataset.maps, "_blank"));
        btnAtivo.addEventListener("click", () => window.open("https://sistema.ativotelecom.com.br/central_assinante_web/login", "_blank"));

        // Botões de copiar (login / senha PPPoE)
        card.querySelectorAll(".btn-copiar").forEach(btn => {
          btn.addEventListener("click", () => {
            const valor = btn.dataset.copiar || "";
            if (!valor) {
              mostrarToast("⚠️ Nada para copiar");
              return;
            }
            navigator.clipboard.writeText(valor).then(() => {
              mostrarToast("✅ Copiado com sucesso");
              btn.classList.add("copiado");
              btn.textContent = "✅";
              setTimeout(() => {
                btn.classList.remove("copiado");
                btn.textContent = "📋";
              }, 1500);
            });
          });
        });

        const statusSalvo = localStorage.getItem(`status_${tecnicoAtual}_${os}`);
        if (statusSalvo) atualizarStatusUI(card, box, btnRota, statusSalvo);

        btnRota.addEventListener("click", () => {
          localStorage.setItem(`status_${tecnicoAtual}_${os}`, "rota");
          atualizarStatusUI(card, box, btnRota, "rota");

          const script = `🚗 EM ROTA\n\n👤 Cliente: ${cliente}\n📍 Endereço: ${endereco}`;

          navigator.clipboard.writeText(script).then(() => {
            mostrarToast("✅ Texto copiado!");
            window.open("https://t.me/c/1989058391/167773", "_blank");
          });
        });
      });
    }

    function atualizarStatusUI(card, box, btnRota, status) {
      box.className = "status-box";
      if (status === "rota") {
        box.innerHTML = "🚗 Em rota";
        box.classList.add("rota");
        btnRota.style.opacity = "0.6";
        btnRota.style.pointerEvents = "none";
      }
    }

    function mostrarToast(msg) {
      const toast = document.getElementById("toast");
      toast.textContent = msg;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2600);
    }

    function mostrarImportador() {
      document.getElementById("importador").classList.remove("oculto");
      document.getElementById("btnMostrar").style.display = "none";
    }
  </script>
</body>
</html>
