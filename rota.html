<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda Técnica Inteligente</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #0f172a 0%, #020617 75%);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
      padding: 20px;
    }

    .topo {
      margin-bottom: 32px;
      text-align: center;
    }

    .topo h1 {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(90deg, #22d3ee, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .topo p {
      color: #94a3b8;
      font-size: 15.5px;
    }

    .seletor-tecnico {
      display: flex;
      flex-direction: column;
      gap: 18px;
      max-width: 520px;
      margin: 0 auto 32px;
    }

    .seletor-tecnico.oculto {
      display: none;
    }

    .btn-tecnico {
      position: relative;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px);
      color: white;
      padding: 24px 28px;
      border-radius: 24px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .btn-tecnico:hover {
      transform: translateY(-4px);
      background: linear-gradient(135deg, #22d3ee, #3b82f6);
      border-color: transparent;
    }

    .status-preview {
      display: flex;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
    }

    .status-preview span {
      padding: 4px 12px;
      border-radius: 999px;
    }

    .preview-rota { background: rgba(234, 179, 8, 0.25); color: #fde047; }
    .preview-concluido { background: rgba(74, 222, 128, 0.25); color: #4ade80; }

    .painel-tecnico.oculto { display: none; }

    .btn-trocar {
      display: block;
      margin: 0 auto 20px;
      border: none;
      background: none;
      color: #67e8f9;
      font-size: 14.5px;
      font-weight: 700;
      cursor: pointer;
      padding: 6px 10px;
    }

    .importador {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      border-radius: 28px;
      padding: 28px;
      margin-bottom: 32px;
    }

    .importador.oculto {
      display: none;
    }

    textarea {
      width: 100%;
      min-height: 260px;
      resize: vertical;
      border: none;
      outline: none;
      border-radius: 24px;
      padding: 22px;
      font-size: 15.5px;
      background: rgba(255, 255, 255, 0.07);
      color: white;
      line-height: 1.65;
    }

    .btn-gerar {
      width: 100%;
      margin-top: 20px;
      border: none;
      padding: 18px;
      border-radius: 20px;
      font-size: 16.5px;
      font-weight: 700;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #22d3ee, #3b82f6);
      box-shadow: 0 10px 20px rgba(34, 211, 238, 0.2);
    }

    .btn-mostrar {
      display: none;
      width: 100%;
      margin-bottom: 20px;
      border: none;
      padding: 16px;
      border-radius: 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      color: white;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .cards {
      display: flex;
      gap: 24px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      padding-bottom: 20px;
    }

    .card {
      min-width: 360px;
      max-width: 360px;
      flex-shrink: 0;
      scroll-snap-align: center;
      border-radius: 32px;
      padding: 26px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      transition: all 0.4s ease;
      position: relative;
    }

    .card:hover { transform: translateY(-8px); }

    .btn-editar-os {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 36px;
      height: 36px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: #a5b4fc;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s;
      z-index: 2;
    }

    .btn-editar-os:hover {
      background: rgba(165, 180, 252, 0.2);
      color: #c4b5fd;
      border-color: rgba(165,180,252,0.35);
      transform: scale(1.08);
    }

    .horario {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 999px;
      background: linear-gradient(90deg, #22d3ee, #3b82f6);
      font-size: 14.5px;
      font-weight: 700;
      margin-bottom: 18px;
    }

    .cliente { font-size: 24px; font-weight: 800; margin-bottom: 16px; padding-right: 44px; }

    .info {
      color: #cbd5e1;
      line-height: 1.65;
      margin: 10px 0;
      font-size: 15px;
    }

    .info strong { color: #e0f2fe; }

    .info-linha {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 10px 0;
    }

    .btn-copiar {
      flex-shrink: 0;
      border: none;
      width: 34px;
      height: 34px;
      border-radius: 10px;
      cursor: pointer;
      color: #67e8f9;
      background: rgba(103, 232, 249, 0.12);
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s;
    }

    .btn-copiar:hover { background: rgba(103, 232, 249, 0.22); transform: translateY(-1px); }
    .btn-copiar.copiado { background: rgba(74, 222, 128, 0.18); color: #4ade80; }

    .os-number {
      font-size: 17px;
      font-weight: 800;
      color: #67e8f9;
      background: rgba(103, 232, 249, 0.12);
      padding: 4px 12px;
      border-radius: 8px;
    }

    .assunto {
      font-size: 14.5px;
      color: #a5b4fc;
      background: rgba(165, 180, 252, 0.1);
      padding: 6px 12px;
      border-radius: 8px;
      margin: 8px 0;
    }

    .botoes-grupo {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn-links { display: flex; gap: 12px; }

    .btn-maps, .btn-ativo, .btn-status-rota {
      border: none;
      padding: 15px;
      border-radius: 18px;
      font-size: 14.5px;
      font-weight: 700;
      cursor: pointer;
      color: white;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-maps { flex: 1; background: linear-gradient(135deg, #f43f5e, #fb923c); }
    .btn-ativo { flex: 1; background: linear-gradient(135deg, #64748b, #475569); }
    .btn-status-rota { background: linear-gradient(135deg, #eab308, #f59e0b); padding: 16px; }

    .status-box {
      margin-top: 16px;
      padding: 14px;
      border-radius: 16px;
      text-align: center;
      font-weight: 700;
      font-size: 15px;
    }

    .rota {
      background: rgba(234, 179, 8, 0.15);
      color: #fde047;
      border: 1px solid rgba(234, 179, 8, 0.4);
    }

    .concluido {
      background: rgba(74, 222, 128, 0.15);
      color: #4ade80;
      border: 1px solid rgba(74, 222, 128, 0.4);
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(2, 6, 23, 0.85);
      backdrop-filter: blur(10px);
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.aberto {
      display: flex;
    }

    .modal {
      background: #0f172a;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 32px;
      padding: 32px 28px;
      width: 100%;
      max-width: 480px;
      max-height: 92vh;
      overflow-y: auto;
      position: relative;
      box-shadow: 0 40px 80px rgba(0,0,0,0.6);
    }

    .modal-titulo {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 24px;
      background: linear-gradient(90deg, #22d3ee, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .modal-fechar {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 34px;
      height: 34px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.07);
      color: #94a3b8;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .modal-fechar:hover {
      background: rgba(244, 63, 94, 0.2);
      color: #f87171;
      border-color: rgba(244,63,94,0.3);
    }

    .campo-grupo {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }

    .campo-label {
      font-size: 12px;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .campo-input {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 13px 16px;
      font-size: 15px;
      color: white;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    .campo-input:focus {
      border-color: rgba(34, 211, 238, 0.45);
      background: rgba(34, 211, 238, 0.05);
    }

    .campo-select {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 13px 16px;
      font-size: 15px;
      color: white;
      outline: none;
      width: 100%;
      cursor: pointer;
      transition: border-color 0.2s;
      appearance: none;
      -webkit-appearance: none;
    }

    .campo-select option {
      background: #0f172a;
      color: white;
    }

    .campo-select:focus {
      border-color: rgba(34, 211, 238, 0.45);
    }

    .select-wrapper {
      position: relative;
    }

    .select-wrapper::after {
      content: '▾';
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #64748b;
      pointer-events: none;
      font-size: 14px;
    }

    .modal-divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.07);
      margin: 20px 0;
    }

    .modal-secao {
      font-size: 11px;
      font-weight: 700;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
    }

    .btn-salvar-modal {
      width: 100%;
      margin-top: 24px;
      border: none;
      padding: 17px;
      border-radius: 18px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #22d3ee, #3b82f6);
      box-shadow: 0 8px 20px rgba(34, 211, 238, 0.2);
      transition: opacity 0.2s;
    }

    .btn-salvar-modal:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .btn-salvar-modal:not(:disabled):hover {
      opacity: 0.9;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15, 23, 42, 0.96);
      border: 1px solid rgba(34, 211, 238, 0.2);
      backdrop-filter: blur(16px);
      padding: 16px 26px;
      border-radius: 20px;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: all 0.4s;
      z-index: 999;
      white-space: nowrap;
    }

    .toast.show { opacity: 1; }

    /* ========== ESTILOS DO LOADING ANIMADO ========== */
    .loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200; /* Garante visibilidade sobre os modais */
      background: rgba(2, 6, 23, 0.75);
      backdrop-filter: blur(12px);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
    }

    .loading-overlay.ativo {
      display: flex;
    }

    .spinner-container {
      position: relative;
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .spinner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 4px solid rgba(255, 255, 255, 0.03);
      border-top-color: #22d3ee;
      border-right-color: #3b82f6;
      animation: rodar 1s cubic-bezier(0.55, 0.055, 0.675, 0.19) infinite;
    }

    .spinner-pulso {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(34, 211, 238, 0.15) 0%, transparent 70%);
      animation: pulsar 1.6s ease-in-out infinite;
    }

    .loading-texto {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #e2e8f0;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
      animation: piscar 1.6s ease-in-out infinite;
    }

    @keyframes rodar {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes pulsar {
      0%, 100% { transform: scale(0.9); opacity: 0.4; }
      50% { transform: scale(1.3); opacity: 0.9; }
    }

    @keyframes piscar {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    @media(max-width: 640px) {
      .card { min-width: 92vw; max-width: 92vw; }
      .modal { padding: 26px 20px; }
    }
  </style>
</head>

<body>

  <div class="topo">
    <h1>📡 Agenda Técnica Inteligente</h1>
    <p id="subtitulo">Selecione o técnico para começar</p>
  </div>

  <div class="seletor-tecnico" id="seletorTecnico">
    <button class="btn-tecnico" data-tecnico="Andre" onclick="selecionarTecnico('Andre')">
      <div>👤 Andre</div>
      <div class="status-preview" id="preview-Andre"></div>
    </button>

    <button class="btn-tecnico" data-tecnico="Guilherme" onclick="selecionarTecnico('Guilherme')">
      <div>👤 Guilherme</div>
      <div class="status-preview" id="preview-Guilherme"></div>
    </button>
  </div>

  <div class="painel-tecnico oculto" id="painelTecnico">
    <button class="btn-trocar" onclick="trocarTecnico()">↩️ Trocar técnico</button>

    <button class="btn-mostrar" id="btnMostrar" onclick="mostrarImportador()">
      📋 Mostrar campo da agenda
    </button>

    <div class="importador" id="importador">
      <textarea id="entrada" placeholder="Cole aqui a agenda completa..."></textarea>
      <button class="btn-gerar" onclick="gerarAgenda()">🚀 Gerar Agenda Inteligente</button>
    </div>

    <div class="cards" id="cards"></div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <button class="modal-fechar" onclick="fecharModal()" title="Fechar">✕</button>
      <div class="modal-titulo">✏️ Editar OS</div>

      <div class="modal-secao">Dados Principais</div>

      <div class="campo-grupo">
        <label class="campo-label">Horário</label>
        <input class="campo-input" id="edit-horario" type="text" placeholder="Ex: 08:00 - 09:00" />
      </div>

      <div class="campo-grupo">
        <label class="campo-label">Cliente</label>
        <input class="campo-input" id="edit-cliente" type="text" placeholder="Nome do cliente" />
      </div>

      <div class="campo-grupo">
        <label class="campo-label">Assunto</label>
        <input class="campo-input" id="edit-assunto" type="text" placeholder="Assunto da OS" />
      </div>

      <div class="campo-grupo">
        <label class="campo-label">Endereço</label>
        <input class="campo-input" id="edit-endereco" type="text" placeholder="Endereço completo" />
      </div>

      <hr class="modal-divider" />
      <div class="modal-secao">Credenciais</div>

      <div class="campo-grupo">
        <label class="campo-label">Login</label>
        <input class="campo-input" id="edit-login" type="text" placeholder="Login do cliente" />
      </div>

      <div class="campo-grupo">
        <label class="campo-label">Senha PPPoE</label>
        <input class="campo-input" id="edit-senha" type="text" placeholder="Senha PPPoE" />
      </div>

      <hr class="modal-divider" />
      <div class="modal-secao">Status da OS</div>

      <div class="campo-grupo">
        <div class="select-wrapper">
          <select class="campo-select" id="edit-status">
            <option value="">Aguardando status</option>
            <option value="rota">🚗 Em rota</option>
            <option value="concluido">✅ Concluído</option>
          </select>
        </div>
      </div>

      <button class="btn-salvar-modal" id="btnSalvarModal" onclick="salvarEdicaoOS()">
        💾 Salvar alterações
      </button>
    </div>
  </div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner-container">
      <div class="spinner-pulso"></div>
      <div class="spinner"></div>
    </div>
    <div class="loading-texto" id="loadingTexto">Sincronizando dados...</div>
  </div>

  <div class="toast" id="toast">✅ Copiado com sucesso</div>

  <script>
    const API_URL = "https://68f458d8b16eb6f46834542c.mockapi.io/Rexord/Galeria";

    let tecnicoAtual = null;
    let registroAtualId = null;
    let statusOS = {};
    let dadosOS = [];
    let osEditandoIndex = null;

    /* CONTROLE LOGICO DO LOADING OVERLAY */
    function toggleLoading(exibir, mensagem = "Sincronizando dados...") {
      const overlay = document.getElementById("loadingOverlay");
      const texto = document.getElementById("loadingTexto");
      texto.textContent = mensagem;
      if (exibir) {
        overlay.classList.add("ativo");
      } else {
        overlay.classList.remove("ativo");
      }
    }

    function atualizarPreviewsIniciais() {
      const tecnicos = ['Andre', 'Guilherme'];
      tecnicos.forEach(tec => {
        const preview = document.getElementById(`preview-${tec}`);
        if (!preview) return;

        let emRota = 0, concluidas = 0;
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (key && key.startsWith(`status_${tec}_`)) {
            const st = localStorage.getItem(key);
            if (st === "rota") emRota++;
            if (st === "concluido") concluidas++;
          }
        }

        let html = '';
        if (emRota > 0) html += `<span class="preview-rota">🚗 ${emRota}</span>`;
        if (concluidas > 0) html += `<span class="preview-concluido">✅ ${concluidas}</span>`;
        preview.innerHTML = html || '<span style="color:#64748b">Sem atividades</span>';
      });
    }

    function selecionarTecnico(nome) {
      tecnicoAtual = nome;
      document.getElementById("subtitulo").textContent = `Agenda de ${nome}`;
      document.getElementById("seletorTecnico").classList.add("oculto");
      document.getElementById("painelTecnico").classList.remove("oculto");
      carregarAgendaDaApi();
    }

    function trocarTecnico() {
      tecnicoAtual = null;
      registroAtualId = null;
      statusOS = {};
      dadosOS = [];
      document.getElementById("subtitulo").textContent = "Selecione o técnico para começar";
      document.getElementById("seletorTecnico").classList.remove("oculto");
      document.getElementById("painelTecnico").classList.add("oculto");
      document.getElementById("cards").innerHTML = "";
      document.getElementById("entrada").value = "";
      document.getElementById("importador").classList.remove("oculto");
      document.getElementById("btnMostrar").style.display = "none";
      atualizarPreviewsIniciais();
    }

    async function carregarAgendaDaApi() {
      toggleLoading(true, "Buscando agenda no servidor...");
      try {
        const resp = await fetch(`${API_URL}?tecnico=${encodeURIComponent(tecnicoAtual)}`);
        const dados = await resp.json();
        if (dados && dados.length > 0) {
          const registro = dados[0];
          registroAtualId = registro.id;
          document.getElementById("entrada").value = registro.agenda || "";
          
          if (registro.status) {
            try {
              const statusSalvo = JSON.parse(registro.status);
              Object.keys(statusSalvo).forEach(osId => {
                localStorage.setItem(`status_${tecnicoAtual}_${osId}`, statusSalvo[osId]);
              });
            } catch(e) {}
          }

          if (registro.agenda) {
            criarCards(registro.agenda);
            document.getElementById("importador").classList.add("oculto");
            document.getElementById("btnMostrar").style.display = "block";
          }
        }
      } catch (e) {
        mostrarToast("❌ Erro ao carregar dados.");
      } finally {
        toggleLoading(false);
      }
    }

    async function salvarAgendaNaApi(texto, mensagemSilenciosa = false) {
      if(!mensagemSilenciosa) toggleLoading(true, "Salvando alterações...");
      
      const statusParaSalvar = {};
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.startsWith(`status_${tecnicoAtual}_`)) {
          const osId = key.replace(`status_${tecnicoAtual}_`, "");
          statusParaSalvar[osId] = localStorage.getItem(key);
        }
      }

      try {
        const payload = {
          tecnico: tecnicoAtual,
          agenda: texto,
          status: JSON.stringify(statusParaSalvar)
        };

        if (registroAtualId) {
          await fetch(`${API_URL}/${registroAtualId}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
        } else {
          const resp = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
          const criado = await resp.json();
          registroAtualId = criado.id;
        }
      } catch (e) {
        mostrarToast("❌ Falha ao sincronizar com servidor.");
      } finally {
        if(!mensagemSilenciosa) toggleLoading(false);
      }
    }

    function gerarAgenda() {
      const texto = document.getElementById("entrada").value.trim();
      if (!texto) return;

      criarCards(texto);
      salvarAgendaNaApi(texto);
      document.getElementById("importador").classList.add("oculto");
      document.getElementById("btnMostrar").style.display = "block";
    }

    function parsearAgenda(texto) {
      const blocks = texto.split(/ID:\s*/i).slice(1);
      return blocks.map(bloco => ({
        id:        bloco.match(/^(\d+)/)?.[1]?.trim()                          || "Sem ID",
        cliente:   bloco.match(/Cliente:\s*(.*)/i)?.[1]?.trim()                || "Cliente não informado",
        horario:   bloco.match(/Horário:\s*(.*)/i)?.[1]?.trim()                || "",
        endereco:  bloco.match(/Endereço:\s*(.*)/i)?.[1]?.trim()               || "",
        login:     bloco.match(/Login:\s*(.*)/i)?.[1]?.trim()                  || "",
        senha:     bloco.match(/Senha\s*(?:do\s*)?PP+o?E:\s*(.*)/i)?.[1]?.trim() || "",
        assunto:   bloco.match(/Assunto:\s*(.*)/i)?.[1]?.trim()                || "Sem assunto",
        raw:       bloco
      }));
    }

    function serializarAgenda(lista) {
      return lista.map(os => (
        `ID: ${os.id}\n` +
        `Horário: ${os.horario}\n` +
        `Cliente: ${os.cliente}\n` +
        `Assunto: ${os.assunto}\n` +
        `Endereço: ${os.endereco}\n` +
        `Login: ${os.login}\n` +
        `Senha PPPoE: ${os.senha}`
      )).join("\n\n");
    }

    function escapeHtml(str) {
      return (str || "").replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function criarCards(texto) {
      dadosOS = parsearAgenda(texto);
      const cardsContainer = document.getElementById("cards");
      cardsContainer.innerHTML = "";

      dadosOS.forEach((os, idx) => {
        const enderecoLimpo = (os.endereco || "").replace(/\?/g, "").replace(/\s+/g, " ").trim();
        const maps = `https://maps.google.com/?q=${encodeURIComponent(enderecoLimpo)}`;
        const loginSeguro = escapeHtml(os.login);
        const senhaSegura = escapeHtml(os.senha);

        cardsContainer.innerHTML += `
          <div class="card" data-idx="${idx}" data-id="${os.id}" data-cliente="${escapeHtml(os.cliente)}" data-maps="${escapeHtml(maps)}" data-endereco="${escapeHtml(enderecoLimpo)}">

            <button class="btn-editar-os" title="Editar OS" onclick="abrirModal(${idx})">✏️</button>

            <div class="horario">🕒 ${os.horario}</div>
            <div class="cliente">${escapeHtml(os.cliente)}</div>
            <div class="info"><strong>🔹 O.S:</strong> <span class="os-number">${os.id}</span></div>
            <div class="assunto">📋 ${escapeHtml(os.assunto)}</div>
            <div class="info"><strong>📍 Endereço:</strong><br>${escapeHtml(enderecoLimpo)}</div>

            <div class="info-linha">
              <div class="info"><strong>🔐 Login:</strong> ${loginSeguro || "&nbsp;"}</div>
              <button class="btn-copiar" data-copiar="${loginSeguro}" title="Copiar login">📋</button>
            </div>

            <div class="info-linha">
              <div class="info"><strong>🔑 Senha PPPoE:</strong> ${senhaSegura || "&nbsp;"}</div>
              <button class="btn-copiar" data-copiar="${senhaSegura}" title="Copiar senha">📋</button>
            </div>

            <div class="botoes-grupo">
              <div class="btn-links">
                <button class="btn-maps">🗺️ Maps</button>
                <button class="btn-ativo">🌐 Ativo</button>
              </div>
              <button class="btn-status-rota">🚗 Iniciar Rota</button>
            </div>

            <div class="status-box vazio">Aguardando status</div>
          </div>
        `;
      });

      iniciarEventos();
    }

    function iniciarEventos() {
      statusOS = {};

      document.querySelectorAll(".card").forEach(card => {
        const os      = card.dataset.id;
        const cliente = card.dataset.cliente;
        const endereco = card.dataset.endereco;
        const box     = card.querySelector(".status-box");
        const btnRota = card.querySelector(".btn-status-rota");

        card.querySelector(".btn-maps").addEventListener("click", () => window.open(card.dataset.maps, "_blank"));
        card.querySelector(".btn-ativo").addEventListener("click", () => window.open("https://sistema.ativotelecom.com.br/central_assinante_web/login", "_blank"));

        card.querySelectorAll(".btn-copiar").forEach(btn => {
          btn.addEventListener("click", () => {
            const valor = btn.dataset.copiar || "";
            if (!valor) return;
            navigator.clipboard.writeText(valor).then(() => {
              mostrarToast("✅ Copiado com sucesso");

              if (btn.getAttribute("title").includes("senha")) {
                statusOS[os] = "concluido";
                localStorage.setItem(`status_${tecnicoAtual}_${os}`, "concluido");
                aplicarStatus(box, btnRota, "concluido");
                salvarAgendaNaApi(document.getElementById("entrada").value, true);
              }
              atualizarPreviewsIniciais();
            });
          });
        });

        btnRota.addEventListener("click", () => {
          statusOS[os] = "rota";
          localStorage.setItem(`status_${tecnicoAtual}_${os}`, "rota");
          aplicarStatus(box, btnRota, "rota");
          salvarAgendaNaApi(document.getElementById("entrada").value, true);

          const script = `🚗 EM ROTA\n\n👤 Cliente: ${cliente}\n📍 Endereço: ${endereco}`;
          navigator.clipboard.writeText(script).then(() => {
            mostrarToast("✅ Texto copiado!");
            window.open("https://t.me/c/1989058391/167773", "_blank");
          });
          atualizarPreviewsIniciais();
        });

        const statusSalvo = localStorage.getItem(`status_${tecnicoAtual}_${os}`);
        if (statusSalvo) {
          statusOS[os] = statusSalvo;
          aplicarStatus(box, btnRota, statusSalvo);
        }
      });
    }

    function aplicarStatus(box, btnRota, status) {
      if (status === "rota") {
        box.className = "status-box rota";
        box.innerHTML = "🚗 Em rota";
        btnRota.style.opacity = "0.6";
        btnRota.style.pointerEvents = "none";
      } else if (status === "concluido") {
        box.className = "status-box concluido";
        box.innerHTML = "✅ Concluído";
      }
    }

    function abrirModal(idx) {
      osEditandoIndex = idx;
      const os = dadosOS[idx];

      document.getElementById("edit-horario").value  = os.horario  || "";
      document.getElementById("edit-cliente").value  = os.cliente  || "";
      document.getElementById("edit-assunto").value  = os.assunto  || "";
      document.getElementById("edit-endereco").value = (os.endereco || "").replace(/\?/g, "").replace(/\s+/g, " ").trim();
      document.getElementById("edit-login").value    = os.login     || "";
      document.getElementById("edit-senha").value    = os.senha     || "";

      const statusSalvo = localStorage.getItem(`status_${tecnicoAtual}_${os.id}`) || "";
      document.getElementById("edit-status").value = statusSalvo;

      document.getElementById("btnSalvarModal").disabled = false;
      document.getElementById("modalOverlay").classList.add("aberto");
    }

    function fecharModal() {
      document.getElementById("modalOverlay").classList.remove("aberto");
      osEditandoIndex = null;
    }

    document.getElementById("modalOverlay").addEventListener("click", function(e) {
      if (e.target === this) fecharModal();
    });

    async function salvarEdicaoOS() {
      if (osEditandoIndex === null) return;

      const btn = document.getElementById("btnSalvarModal");
      btn.disabled = true;
      btn.textContent = "⏳ Salvando...";

      const os = dadosOS[osEditandoIndex];

      os.horario  = document.getElementById("edit-horario").value.trim();
      os.cliente  = document.getElementById("edit-cliente").value.trim();
      os.assunto  = document.getElementById("edit-assunto").value.trim();
      os.endereco = document.getElementById("edit-endereco").value.trim();
      os.login    = document.getElementById("edit-login").value.trim();
      os.senha    = document.getElementById("edit-senha").value.trim();

      const novoStatus = document.getElementById("edit-status").value;

      if (novoStatus) {
        localStorage.setItem(`status_${tecnicoAtual}_${os.id}`, novoStatus);
        statusOS[os.id] = novoStatus;
      } else {
        localStorage.removeItem(`status_${tecnicoAtual}_${os.id}`);
        delete statusOS[os.id];
      }

      const novoTexto = serializarAgenda(dadosOS);
      document.getElementById("entrada").value = novoTexto;
      
      fecharModal();
      
      await salvarAgendaNaApi(novoTexto);

      criarCards(novoTexto);
      mostrarToast("💾 OS atualizada com sucesso!");
      atualizarPreviewsIniciais();
    }

    function mostrarToast(msg) {
      const toast = document.getElementById("toast");
      toast.textContent = msg;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2600);
    }

    function mostrarImportador() {
      document.getElementById("importador").classList.remove("oculto");
      document.getElementById("btnMostrar").style.display = "none";
    }

    window.onload = atualizarPreviewsIniciais;
  </script>
</body>
</html>
